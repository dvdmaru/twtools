            '',
            'COMPOSITION — THIS IS THE SINGLE MOST IMPORTANT REQUIREMENT:',
            '- THE FACE MUST FILL 95-100% OF THE ENTIRE CANVAS. Not 80%, not 90% — aim for the absolute maximum.',
            '- Draw ONLY the face. Imagine the camera is 3cm from the character\'s nose.',
            '- The top of the ears/head MUST be CROPPED BY the top edge — partially cut off is CORRECT.',
            '- The chin MUST nearly touch or be cropped by the bottom edge.',
            '- The cheeks MUST nearly touch the left and right edges.',
            '- There should be almost ZERO empty space between the face and the canvas edges.',
            '- Think of how Apple/Google emojis look: 😀🐱🐶 — the face fills the entire square with virtually no margin.',
            '- ⛔ If there is visible empty background on any side wider than 5% of the canvas, you have FAILED the composition requirement.',
            '',
            'STYLE REQUIREMENTS:',
            '- Use BOLD, THICK outlines/linework for maximum visibility at tiny sizes',
            '- Use VIBRANT, SATURATED colors — not pastel or muted',
            '- Expression must be EXTREMELY EXAGGERATED — big wide eyes, huge open mouth, visible tears, giant sweat drops, etc.',
            '- The expression must be INSTANTLY recognizable even at 24px display size',
            '',
            'TECHNICAL REQUIREMENTS:',
            '- PRESERVE the character species and visual identity from the reference image — #1 priority',
            '- Do NOT include any text, letters, words, numbers, or characters in the image',
            '- Use a clean solid CHROMA KEY GREEN background (hex #00B140) — fill the ENTIRE background with this exact green color',
            '- Single character face only, centered in frame',
            '- No decorative borders, frames, or background elements',
            '- No body parts below the neck (except hands near face for specific expressions like face-palming)',
          ].join('\n');
        }

        // === Big Face Sticker mode: face occupies 80%+ of canvas ===
        if (isBigFace) {
          const meta = captionMeta[index];
          const caption = captions[index] || '';
          const originalText = meta?.originalText || '';
          const wasEdited = caption !== originalText && originalText !== '';
          const moodStr = wasEdited ? '' : (meta?.mood || 'neutral');
          // P8.2 wordless mode：每張獨立指派 archetype，避免 12 張 prompt 全部 fallback 到 'neutral' 造成雷同
          const wordlessExpression = wordlessMode
            ? WORDLESS_EXPRESSIONS[index % WORDLESS_EXPRESSIONS.length]
            : null;
          // 活動額外 prompt 規則（campaign overlay）
          const campaignRule = activeCampaign ? (CAMPAIGNS[activeCampaign]?.promptOverlay || '') : '';
          return [
            `IMPORTANT: Look at the reference image carefully. Identify the character's SPECIES (cat, dog, rabbit, human, etc.), face shape, color palette, and key FACIAL features. You MUST preserve ALL of these in your output.`,
            '',
            `Based on the reference character image provided, generate a FACE-ONLY EXTREME CLOSE-UP illustration ${stylePrompt}.`,
            `The character MUST be the SAME species and type as the reference — NEVER change the species.`,
            `Preserve the character's distinctive FACIAL features: fur/hair color, eye shape, eye color, ear shape, nose, accessories, markings, and face proportions.`,
            '',
            wordlessExpression
              ? `This is a LINE "BIG FACE" WORDLESS sticker (NO TEXT, NO LETTERS, NO NUMBERS anywhere in the image). The character's face MUST vividly perform this SPECIFIC archetype: ${wordlessExpression}. Push it to absolute cartoon-extreme. This is the ONE specific archetype assigned to THIS sticker — it must look visibly DIFFERENT from any other sticker in the same set.`
              : (wasEdited
                ? `This is a LINE "BIG FACE" sticker with the text "${caption}". The character's facial expression must clearly convey the feeling of "${caption}" at maximum intensity.`
                : `The character should express: mood "${moodStr}" for the text "${caption}". Make the expression EXTREMELY exaggerated and dramatic.`),
            campaignRule ? `\n🎯 CAMPAIGN RULE (MUST FOLLOW):\n${campaignRule}\n` : '',
            extraHint ? `\nADDITIONAL USER INSTRUCTION (highest priority): ${extraHint}\n` : '',
            '',
            '🔴 COMPOSITION — THE SINGLE MOST IMPORTANT RULE:',
            '- THE FACE MUST FILL THE ENTIRE 370×320 CANVAS. Not 80% — aim for 95-100%.',
            '- Draw ONLY the face. Imagine the camera is 5cm from the character\'s nose.',
            '- The top of the head/ears should be CROPPED BY the top edge of the canvas.',
            '- The chin should nearly touch the bottom edge.',
            '- The cheeks should nearly touch the left and right edges.',
            '- Think of how a face looks when someone presses their face against a glass window — that\'s how big.',
            '- ⛔ ABSOLUTELY NO body, neck, shoulders, torso, arms, hands, or legs. ZERO. Not even a hint.',
            '- ⛔ NO "bust shot", NO "portrait from chest up". ONLY the FACE from forehead to chin.',
            '- The ONLY exception: a single hand touching the face (like covering mouth or wiping tears) — but the face must still fill 90%+.',
            '',
            'EXPRESSION REQUIREMENTS:',
            '- Every expression must be ABSURDLY exaggerated — dial it to 300%.',
            '- Eyes: should be HUGE (taking up 30%+ of the face), with exaggerated pupils, visible sparkles/tears/spirals.',
            '- Mouth: stretched impossibly wide for laughing/screaming, tiny dot for shocked, wobbly line for crying.',
            '- Effects: tears FLYING off the face, steam from ears, literal sparkles, sweat drops the size of fists, popping veins, spiral eyes.',
            '- The face should look like a manga reaction panel — maximum comedic impact.',
            '',
            'TECHNICAL REQUIREMENTS:',
            '- PRESERVE the character species and visual identity from the reference image',
            '- Do NOT include any text, letters, words, numbers, or characters in the image',
            '- Use a clean solid CHROMA KEY GREEN background (hex #00B140) — fill the ENTIRE background',
            '- Single character face only, centered in frame',
            '- No decorative borders or frames',
          ].join('\n');
        }

        // === Sticker / Big Sticker mode ===
        const meta = captionMeta[index];
        const caption = captions[index] || '';
        const originalText = meta?.originalText || '';
        const wasEdited = caption !== originalText && originalText !== '';
        const moodStr = wasEdited ? '' : (meta?.mood || 'neutral');
        const actionStr = wasEdited ? '' : (meta?.action || 'standing with a gentle expression');
        // P8.2 wordless mode：每張獨立指派 archetype，避免 captionMeta 為空時 fallback 到同一句 'standing with a gentle expression' 造成 12+ 張 prompt 雷同
        const wordlessExpression = wordlessMode
          ? WORDLESS_EXPRESSIONS[index % WORDLESS_EXPRESSIONS.length]
          : null;
        // 活動額外 prompt 規則（campaign overlay）
        const campaignRule = activeCampaign ? (CAMPAIGNS[activeCampaign]?.promptOverlay || '') : '';
        return [
          `IMPORTANT: Look at the reference image carefully. Identify the character's SPECIES (cat, dog, rabbit, human, etc.), body shape, color palette, and key visual features. You MUST preserve ALL of these in your output.`,
          '',
          `Based on the reference character image provided, generate a single character illustration ${stylePrompt}.`,
          `The character MUST be the SAME species and type as the reference — if it is a cat, draw a cat; if it is a dog, draw a dog; if it is a human, draw a human. NEVER change the species.`,
          `Preserve the character's distinctive features: fur/hair color, eye color, accessories, clothing, markings, and proportions from the reference image.`,
          '',
          sceneHint ? `SCENE/COSTUME CONTEXT: ${sceneHint}` : '',
          wordlessExpression
            ? [
                `This illustration is for a LINE messaging ${isBig ? 'BIG WORDLESS sticker (tall portrait format, NO TEXT, NO LETTERS, NO NUMBERS anywhere in the image)' : 'WORDLESS sticker (NO TEXT, NO LETTERS, NO NUMBERS anywhere in the image)'}.`,
                `The character MUST vividly perform this SPECIFIC archetype: ${wordlessExpression}.`,
                `Push it to absolute cartoon-extreme. This is the ONE specific archetype assigned to THIS sticker — it must look visibly DIFFERENT from any other sticker in the same set.`,
              ].join('\n')
            : (wasEdited
                ? `This illustration is for a LINE messaging ${isBig ? 'BIG sticker (tall portrait format)' : 'sticker'} with the text "${caption}". Infer the most appropriate mood, facial expression, and body pose directly from this text. The character's expression and action must clearly convey the feeling of "${caption}".`
                : [
                    `The character should express: ${actionStr} (mood: ${moodStr}).`,
                    `This illustration is for a LINE messaging ${isBig ? 'BIG sticker (tall portrait format)' : 'sticker'} with the text "${caption}".`,
                    `The character pose and expression must clearly match the mood "${moodStr}" and convey the feeling of "${caption}".`,
                  ].join('\n')),
          campaignRule ? `\n🎯 CAMPAIGN RULE (MUST FOLLOW):\n${campaignRule}\n` : '',
          extraHint ? `\nADDITIONAL USER INSTRUCTION (highest priority for this specific sticker): ${extraHint}\n` : '',
          '', 'CRITICAL REQUIREMENTS:',
          '- PRESERVE the character species and visual identity from the reference image — this is the #1 priority',
          '- The character outfit/costume MUST match the scene context described above',
          '- Do NOT include any text, letters, words, numbers, or characters in the image',
          '- Use a clean solid CHROMA KEY GREEN background (hex #00B140) — this specific green is required for automated background removal. Fill the ENTIRE background with this exact green color.',
          isBig
            ? '- TALL PORTRAIT COMPOSITION (396×660 pixels): The canvas is a tall vertical rectangle. Draw the FULL BODY of the character standing/posing, utilizing the full height. The character should occupy 80-90% of the canvas height. This format has more room for expressive full-body poses.'
            : '- FILL THE FRAME: The character should occupy at least 80-90% of the canvas height. Minimize empty space above and below the character. For upper-body shots, crop tightly from chest up. For full-body shots, the character should nearly touch the top and bottom edges.',
          '- Single character only, centered in frame',
          isBig
            ? '- Expressive and clear — full-body pose should be dynamic and readable (396x660 pixels)'
            : '- Expressive and clear at small sizes (370x320 pixels)',
          '- No decorative borders or frames',
        ].join('\n');
      };

      const generateOne = async (index, extraHint = '') => {
        const res = await fetch(`${WORKER_URL}/generate-image`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            prompt: buildPrompt(index, extraHint),
            referenceImage: referenceImage?.dataUrl || null,
            style: selectedStyle,
          }),
        });
        if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || `HTTP ${res.status}`);
        const data = await res.json();
        if (!data.images?.length) throw new Error('No image returned');
        const img = data.images[0];
        return `data:${img.mimeType};base64,${img.base64}`;
      };

      const handleGenerateAll = async () => {
        setIsGenerating(true);
        abortRef.current = false;
        setGenerateProgress({ current: 0, total: stickerCount, errors: [] });
        const nextImages = [...generatedImages];
        for (let i = 0; i < stickerCount; i++) {
          if (abortRef.current) break;
          setGenerateProgress(prev => ({ ...prev, current: i + 1 }));
          if (nextImages[i]) continue;
          try {
            nextImages[i] = await generateOne(i);
            setGeneratedImages([...nextImages]);
          } catch (err) {
            console.error(`Sticker ${i + 1} failed:`, err);
            setGenerateProgress(prev => ({ ...prev, errors: [...prev.errors, { index: i, message: err.message }] }));
          }
        }
        setIsGenerating(false);
      };

      const [regenLoadingIndex, setRegenLoadingIndex] = useState(null);

      const handleRetryOne = async (index) => {
        try {
          const hint = stickerHints[index] || '';
          const dataUrl = await generateOne(index, hint);
          const next = [...generatedImages]; next[index] = dataUrl; setGeneratedImages(next);
          const nextP = [...processedImages]; nextP[index] = null; setProcessedImages(nextP);
          setGenerateProgress(prev => ({ ...prev, errors: prev.errors.filter(e => e.index !== index) }));
        } catch (err) { alert(`第 ${index + 1} 張重試失敗：${err.message}`); }
      };

      // 單張重新生成（已有圖片也可用，帶自訂提示詞）
      const handleRegenOne = async (index) => {
        setRegenLoadingIndex(index);
        try {
          const hint = stickerHints[index] || '';
          const dataUrl = await generateOne(index, hint);
          const next = [...generatedImages]; next[index] = dataUrl; setGeneratedImages(next);
          const nextP = [...processedImages]; nextP[index] = null; setProcessedImages(nextP);
        } catch (err) { alert(`第 ${index + 1} 張重新生成失敗：${err.message}`); }
        finally { setRegenLoadingIndex(null); }
      };

      const completedCount = generatedImages.slice(0, stickerCount).filter(Boolean).length;
      const hasImages = completedCount > 0;

      return (
        <div className="space-y-6">
          <div className="text-center">
            <h2 className="text-xl font-bold text-gray-900 mb-1">預覽 & 生成</h2>
            <p className="text-gray-500 text-sm">
              畫風：{styleName} ・ {stickerCount} 張{isEmoji ? '表情貼' : isBig ? '大貼圖' : isBigFace ? '大臉貼圖' : '貼圖'}
              {isEmoji && <span className="ml-2 text-xs text-amber-500">（180×180 · 無文字）</span>}
            </p>
          </div>

          {/* === Generate Controls === */}
          <div className="text-center space-y-3">
            {!isGenerating ? (
              <button onClick={handleGenerateAll}
                className="px-8 py-3 rounded-xl bg-primary text-white font-bold text-lg
                           hover:bg-primary-dark transition shadow-lg shadow-primary/20">
                ✨ 一鍵生成 {stickerCount} 張
              </button>
            ) : (
              <div className="space-y-2">
                <button onClick={() => { abortRef.current = true; }}
                  className="px-6 py-2.5 rounded-xl bg-red-500 text-white font-medium hover:bg-red-600 transition">
                  ⏹ 停止生成
                </button>
                <div className="text-sm text-gray-500">正在生成第 {generateProgress.current}/{generateProgress.total} 張...</div>
              </div>
            )}
            {(isGenerating || hasImages) && (
              <div className="max-w-md mx-auto">
                <div className="h-2 bg-gray-200 rounded-full overflow-hidden">
                  <div className="h-full bg-primary rounded-full transition-all duration-300"
                    style={{ width: `${Math.round((completedCount / stickerCount) * 100)}%` }} />
                </div>
                <div className="flex justify-between text-xs text-gray-400 mt-1">
                  <span>{completedCount}/{stickerCount} 張完成</span>
                  {generateProgress.errors.length > 0 && (
                    <span className="text-red-400">{generateProgress.errors.length} 張失敗</span>
                  )}
                </div>
              </div>
            )}
            {!isGenerating && generateProgress.errors.length > 0 && (
              <div className="bg-red-50 border border-red-200 rounded-lg p-3 max-w-md mx-auto text-sm">
                <div className="text-red-700 font-medium mb-1">{generateProgress.errors.length} 張生成失敗</div>
                <div className="text-red-500 text-xs">
                  失敗：{generateProgress.errors.map(e => `#${e.index + 1}`).join('、')}
                </div>
                <div className="text-red-400 text-xs mt-1">可點擊失敗圖片上的重試按鈕</div>
              </div>
            )}
          </div>

          {/* === BG + Text Controls (visible after generation) === */}
          {hasImages && (
            <div className="space-y-3">
              {/* Background removal */}
              <div className="ctrl-section">
                <div className="flex flex-wrap items-center gap-4">
                  <div>
                    <span className="ctrl-label">去背方式</span>
                    <div className="flex gap-2">
                      <button onClick={async () => {
                          setBgMethod('smart');
                          const next = [];
                          for (let i = 0; i < stickerCount; i++) {
                            next[i] = generatedImages[i]
                              ? await removeBackgroundSmart(generatedImages[i], bgTolerance)
                              : null;
                          }
                          setProcessedImages(next);
                        }}
                        className={`px-3 py-1.5 rounded-lg text-xs font-medium transition ${
                          bgMethod === 'smart' ? 'bg-primary text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                        }`}>🎯 智慧去背</button>
                      <button onClick={() => { setBgMethod('ml'); handleMLRemoval(); }}
                        disabled={isProcessingBg}
                        className={`px-3 py-1.5 rounded-lg text-xs font-medium transition ${
                          bgMethod === 'ml' ? 'bg-primary text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                        } disabled:opacity-50`}>
                        {isProcessingBg ? '⏳ 載入中...' : '🤖 AI 去背'}
                      </button>
                      <button onClick={async () => {
                          setBgMethod('white');
                          const next = [];
                          for (let i = 0; i < stickerCount; i++) {
                            next[i] = generatedImages[i]
                              ? await removeWhiteBackground(generatedImages[i], bgTolerance)
                              : null;
                          }
                          setProcessedImages(next);
                        }}
                        className={`px-3 py-1.5 rounded-lg text-xs font-medium transition ${
                          bgMethod === 'white' ? 'bg-primary text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                        }`}>⚡ 快速去白</button>
                    </div>
                  </div>
                  {(bgMethod === 'white' || bgMethod === 'smart') && (
                    <div className="flex items-center gap-2">
                      <span className="ctrl-label whitespace-nowrap">容差</span>
                      <input type="range" min="5" max="80" value={bgTolerance}
                        onChange={(e) => handleToleranceChange(Number(e.target.value))} className="w-28" />
                      <span className="text-xs text-gray-500 w-8 text-right">{bgTolerance}</span>
                    </div>
                  )}
                  {isProcessingBg && (
                    <span className="text-xs text-amber-600 animate-pulse">
                      首次載入 AI 模型約需 30-60 秒（~80MB），後續使用有快取
                    </span>
                  )}
                </div>
              </div>

              {/* Text controls (hidden for emoji mode) */}
              {hasText && <TextControls textSettings={textSettings} setTextSettings={setTextSettings} applyLayout={applyLayout} />}
            </div>
          )}

          {/* === Sticker Grid === */}
          <div className="sticker-grid">
            {Array.from({ length: stickerCount }).map((_, i) => {
              const isFailed = generateProgress.errors.find(e => e.index === i);
              const isCurrentlyGenerating = isGenerating && generateProgress.current === i + 1 && !generatedImages[i];
              const isRegening = regenLoadingIndex === i;
              const displayImage = processedImages[i] || generatedImages[i];

              return (
                <div key={i} className="flex flex-col">
                  <div
                    className={`sticker-slot ${displayImage ? 'has-image' : ''} ${
                      isFailed ? 'border-red-300 bg-red-50' : ''
                    } ${selectedSticker === i ? 'selected' : ''}`}
                    style={isEmoji ? { aspectRatio: '1/1' } : isBig ? { aspectRatio: '396/660' } : {}}
                    onClick={() => displayImage && setSelectedSticker(i)}>

                    {isRegening ? (
                      <div className="text-center p-2">
                        <div className="text-2xl mb-1 animate-pulse">⏳</div>
                        <div className="text-xs text-primary font-medium">重新生成中...</div>
                      </div>
                    ) : displayImage && fontsReady ? (
                      <StickerCanvas
                        imageDataUrl={displayImage}
                        caption={hasText ? captions[i] : ''}
                        textSettings={textSettings}
                        position={textPositions[i]}
                        onPositionChange={hasText ? ((pos) => updatePosition(i, pos)) : undefined}
                        canvasW={config.canvasW}
                        canvasH={config.canvasH}
                      />
                    ) : isCurrentlyGenerating ? (
                      <div className="text-center p-2">
                        <div className="text-2xl mb-1 animate-pulse">⏳</div>
                        <div className="text-xs text-primary font-medium">生成中...</div>
                      </div>
                    ) : isFailed ? (
                      <div className="text-center p-2">
                        <div className="text-2xl text-red-300 mb-1">❌</div>
                        <button onClick={(e) => { e.stopPropagation(); handleRetryOne(i); }}
                          className="text-xs text-red-500 hover:text-red-700 underline">重試</button>
                      </div>
                    ) : (
                      <div className="text-center p-2">
                        <div className="text-2xl text-gray-300 mb-1">🖼️</div>
                        <div className="text-xs text-gray-400">{i + 1}</div>
                      </div>
                    )}
                  </div>
                  {/* 單張重生控制列 */}
                  {(displayImage || isFailed) && !isGenerating && (
                    <div className="mt-1 space-y-1">
                      <div className="flex gap-1">
                        <input
                          type="text"
                          value={stickerHints[i] || ''}
                          onChange={(e) => {
                            const next = [...stickerHints];
                            next[i] = e.target.value;
                            setStickerHints(next);
                          }}
                          placeholder="提示詞（如：手舉高）"
                          className="flex-1 text-xs px-2 py-1 border border-gray-200 rounded-lg focus:outline-none focus:border-primary min-w-0"
                          onClick={(e) => e.stopPropagation()}
                        />
                        <button
                          onClick={(e) => { e.stopPropagation(); handleRegenOne(i); }}
                          disabled={regenLoadingIndex !== null}
                          className="text-xs px-2 py-1 rounded-lg bg-primary text-white hover:bg-primary-dark transition whitespace-nowrap disabled:opacity-50"
                          title="重新生成這張">
                          🔄
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* === Summary === */}
          <div className="bg-white rounded-xl p-4 shadow-sm border border-gray-100 text-sm text-gray-600">
            <div className="grid grid-cols-2 gap-2">
              <div>📎 參考圖：{referenceImage?.file?.name || '無'}</div>
              <div>🎨 畫風：{styleName}</div>
              {hasText && <div>📝 文案：{captions.slice(0, stickerCount).filter(c => c.trim()).length}/{stickerCount} 句已填</div>}
              <div>📐 規格：{config.sizeLabel}px（{isEmoji ? 'LINE 表情貼' : isBigFace ? 'LINE 大臉貼圖' : 'LINE 主圖'}）</div>
              {hasText && <div>🔤 字體：{FONTS.find(f => f.family === textSettings.fontFamily)?.label || textSettings.fontFamily}</div>}
              <div>🖌️ 去背：{bgMethod === 'smart' ? `智慧去背（容差 ${bgTolerance}）` : bgMethod === 'white' ? `快速去白（容差 ${bgTolerance}）` : 'AI 去背'}</div>
            </div>
          </div>

          {/* === P5: LINE Listing Text Generator === */}
          {hasImages && (
            <ListingGenerator
              captionTheme={captionTheme}
              captions={captions}
              stickerCount={stickerCount}
              listing={listing}
              setListing={setListing}
              isGeneratingListing={isGeneratingListing}
              setIsGeneratingListing={setIsGeneratingListing}
              isEmoji={isEmoji}
              productType={productType}
            />
          )}

          {/* === P4: Export Section === */}
          {hasImages && (
            <div className="bg-white rounded-xl p-5 shadow-sm border border-gray-100 space-y-4">
              <h3 className="text-base font-bold text-gray-900 flex items-center gap-2">
                📦 匯出 LINE {isEmoji ? '表情貼包' : isBig ? '大貼圖包' : isBigFace ? '大臉貼圖包' : '貼圖包'}
              </h3>
              <p className="text-xs text-gray-400">
                {isEmoji
                  ? `ZIP 包含：${stickerCount} 張表情貼（001.png ~ ${String(stickerCount).padStart(3, '0')}.png，180×180）+ main.png（180×180）+ tab.png（96×74），10px 安全邊距`
                  : `ZIP 包含：${stickerCount} 張主圖（01.png ~ ${String(stickerCount).padStart(2, '0')}.png，${config.sizeLabel}）+ main.png（240×240）+ tab.png（96×74），10px 安全邊距`
                }
              </p>

              {/* main / tab source selector */}
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                {/* Main Image Source */}
                <div>
                  <label className="ctrl-label mb-2 block">Main Image 來源（{config.mainSize}×{config.mainSize} 正方形）</label>
                  <div className="flex gap-2 flex-wrap">
                    {Array.from({ length: stickerCount }).map((_, i) => {
                      const hasSrc = processedImages[i] || generatedImages[i];
                      if (!hasSrc) return null;
                      return (
                        <button key={i} onClick={() => setMainSource(i)}
                          className={`w-10 h-10 rounded-lg text-xs font-bold transition flex items-center justify-center ${
                            mainSource === i
                              ? 'bg-primary text-white ring-2 ring-primary/40'
                              : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                          }`}>
                          {String(i + 1).padStart(2, '0')}
                        </button>
                      );
                    })}
                  </div>
                  {(processedImages[mainSource] || generatedImages[mainSource]) && (
                    <div className="mt-2 inline-block rounded-lg overflow-hidden border border-gray-200"
                      style={{ width: 80, height: 80, background: 'repeating-conic-gradient(#e8e8e8 0% 25%, #fff 0% 50%) 50% / 10px 10px' }}>
                      <img src={processedImages[mainSource] || generatedImages[mainSource]}
                        alt="main preview" className="w-full h-full object-cover" />
                    </div>
                  )}
                </div>

                {/* Tab Image Source */}
                <div>
                  <label className="ctrl-label mb-2 block">Tab Image 來源（96×74 寬扁）</label>
                  <div className="flex gap-2 flex-wrap">
                    {Array.from({ length: stickerCount }).map((_, i) => {
                      const hasSrc = processedImages[i] || generatedImages[i];
                      if (!hasSrc) return null;
                      return (
                        <button key={i} onClick={() => setTabSource(i)}
                          className={`w-10 h-10 rounded-lg text-xs font-bold transition flex items-center justify-center ${
                            tabSource === i
                              ? 'bg-primary text-white ring-2 ring-primary/40'
                              : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                          }`}>
                          {String(i + 1).padStart(2, '0')}
                        </button>
                      );
                    })}
                  </div>
                  {(processedImages[tabSource] || generatedImages[tabSource]) && (
                    <div className="mt-2 inline-block rounded-lg overflow-hidden border border-gray-200"
                      style={{ width: 96, height: 74, background: 'repeating-conic-gradient(#e8e8e8 0% 25%, #fff 0% 50%) 50% / 10px 10px' }}>
                      <img src={processedImages[tabSource] || generatedImages[tabSource]}
                        alt="tab preview" className="w-full h-full object-contain" />
                    </div>
                  )}
                </div>
              </div>

              {/* Export Button + Progress */}
              <div className="flex items-center gap-4">
                <button
                  onClick={async () => {
                    setIsExporting(true);
                    setExportProgress({ done: 0, total: stickerCount + 2, step: '準備中...' });
                    try {
                      const result = await buildStickerZip({
                        processedImages, generatedImages, captions, textSettings, textPositions,
                        stickerCount, mainSourceIndex: mainSource, tabSourceIndex: tabSource,
                        onProgress: (p) => setExportProgress(p),
                        config,
                        wordlessMode,
                      });
                      setExportProgress({ done: result.fileCount, total: result.fileCount,
                        step: `完成！ZIP 大小 ${(result.zipSize / 1024).toFixed(0)} KB` });
                    } catch (err) {
                      console.error('Export failed:', err);
                      alert('匯出失敗：' + err.message);
                      setExportProgress(null);
                    } finally {
                      setIsExporting(false);
                    }
                  }}
                  disabled={isExporting || completedCount < stickerCount}
                  className="px-6 py-3 rounded-xl bg-primary text-white font-bold text-sm
                             hover:bg-primary-dark transition shadow-lg shadow-primary/20
                             disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-2">
                  {isExporting ? (
                    <><span className="animate-spin">⏳</span> 匯出中...</>
                  ) : (
                    <>📦 匯出 LINE {isEmoji ? '表情貼包' : isBig ? '大貼圖包' : isBigFace ? '大臉貼圖包' : '貼圖包'}</>
                  )}
                </button>

                {completedCount < stickerCount && !isExporting && (
                  <span className="text-xs text-amber-600">
                    需先完成全部 {stickerCount} 張生成（目前 {completedCount}/{stickerCount}）
                  </span>
                )}
              </div>

              {/* Export Progress Bar */}
              {exportProgress && (
                <div className="space-y-1">
                  <div className="h-2 bg-gray-200 rounded-full overflow-hidden">
                    <div className="h-full bg-primary rounded-full transition-all duration-300"
                      style={{ width: `${Math.round((exportProgress.done / exportProgress.total) * 100)}%` }} />
                  </div>
                  <div className="flex justify-between text-xs text-gray-400">
                    <span>{exportProgress.step}</span>
                    <span>{exportProgress.done}/{exportProgress.total}</span>
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ============================================================
    // ListingGenerator — LINE Creators Market 上架文案
    // ============================================================

    function ListingGenerator({ captionTheme, captions, stickerCount, listing, setListing, isGeneratingListing, setIsGeneratingListing, isEmoji, productType }) {
      const isBig = productType === 'big';
      const isBigFace = productType === 'bigface';
      const [charDesc, setCharDesc] = useState('');

      const handleGenerate = async () => {
        setIsGeneratingListing(true);
        try {
          const themeLabel = captionTheme === 'custom' ? '自訂主題' :
            (CAPTION_THEMES.find(t => t.id === captionTheme)?.label || captionTheme);
          const res = await fetch(`${WORKER_URL}/generate-listing`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              theme: isEmoji ? '表情貼（LINE Emoji）' : isBigFace ? `大臉貼圖 — ${themeLabel}` : themeLabel,
              captions: isEmoji ? [] : captions.slice(0, stickerCount).filter(c => c.trim()),
              characterDescription: charDesc,
              productType: isEmoji ? 'emoji' : isBigFace ? 'bigface' : 'sticker',
            }),
          });
          const data = await res.json();
          if (data.listing) {
            setListing(data.listing);
          } else {
            alert('上架文案生成失敗：' + (data.error || '未知錯誤'));
          }
        } catch (err) {
          console.error('Generate listing error:', err);
          alert('上架文案生成失敗：' + err.message);
        } finally {
          setIsGeneratingListing(false);
        }
      };

      const handleCopy = (text) => {
        navigator.clipboard.writeText(text).then(() => {
          // 簡易回饋
          const btn = document.activeElement;
          if (btn) { btn.textContent = '✓ 已複製'; setTimeout(() => { btn.textContent = '📋 複製'; }, 1500); }
        });
      };

      const updateField = (field, value) => {
        setListing(prev => ({ ...prev, [field]: value }));
      };

      return (
        <div className="bg-white rounded-xl p-5 shadow-sm border border-gray-100 space-y-4">
          <h3 className="text-base font-bold text-gray-900 flex items-center gap-2">
            📝 LINE 上架文案
            <span className="text-xs font-normal text-gray-400">Creators Market {isEmoji ? '表情貼' : isBig ? '大貼圖' : isBigFace ? '大臉貼圖' : '貼圖'}標題＆說明＆版權（中英文）</span>
          </h3>

          {/* 角色描述（可選） + 生成按鈕 */}
          <div className="flex flex-wrap items-end gap-3">
            <div className="flex-1 min-w-48">
              <label className="text-xs text-gray-500 block mb-1">角色描述（可選，幫助 AI 寫出更精準的文案）</label>
              <input type="text" value={charDesc} onChange={(e) => setCharDesc(e.target.value)}
                placeholder="例如：奶油色小貓、柴犬、企鵝..."
                className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm
                           focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary" />
            </div>
            <button onClick={handleGenerate} disabled={isGeneratingListing}
              className="px-4 py-2 rounded-lg bg-primary text-white text-sm font-medium
                         disabled:opacity-50 hover:bg-primary-dark transition whitespace-nowrap">
              {isGeneratingListing ? '⏳ 生成中...' : '✨ 生成上架文案'}
            </button>
          </div>

          {/* 生成結果 */}
          {listing && (
            <div className="space-y-3">
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                {/* 中文標題 */}
                <div>
                  <div className="flex items-center justify-between mb-1">
                    <label className="text-xs text-gray-500">中文標題（max 40 字元）</label>
                    <button onClick={() => handleCopy(listing.title_zh)}
                      className="text-xs text-primary hover:text-primary-dark">📋 複製</button>
                  </div>
                  <input type="text" value={listing.title_zh || ''} onChange={(e) => updateField('title_zh', e.target.value)}
                    maxLength={40}
                    className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm font-medium
                               focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary" />
                  <span className="text-xs text-gray-300">{(listing.title_zh || '').length}/40</span>
                </div>

                {/* 英文標題 */}
                <div>
                  <div className="flex items-center justify-between mb-1">
                    <label className="text-xs text-gray-500">English Title (max 40 chars)</label>
                    <button onClick={() => handleCopy(listing.title_en)}
                      className="text-xs text-primary hover:text-primary-dark">📋 複製</button>
                  </div>
                  <input type="text" value={listing.title_en || ''} onChange={(e) => updateField('title_en', e.target.value)}
                    maxLength={40}
                    className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm font-medium
                               focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary" />
                  <span className="text-xs text-gray-300">{(listing.title_en || '').length}/40</span>
                </div>

                {/* 中文說明 */}
                <div>
                  <div className="flex items-center justify-between mb-1">
                    <label className="text-xs text-gray-500">中文貼圖說明（max 160 字元）</label>
                    <button onClick={() => handleCopy(listing.description_zh)}
                      className="text-xs text-primary hover:text-primary-dark">📋 複製</button>
                  </div>
                  <textarea value={listing.description_zh || ''} onChange={(e) => updateField('description_zh', e.target.value)}
                    maxLength={160} rows={2}
                    className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm
                               focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary resize-none" />
                  <span className="text-xs text-gray-300">{(listing.description_zh || '').length}/160</span>
                </div>

                {/* 英文說明 */}
                <div>
                  <div className="flex items-center justify-between mb-1">
                    <label className="text-xs text-gray-500">English Description (max 160 chars)</label>
                    <button onClick={() => handleCopy(listing.description_en)}
                      className="text-xs text-primary hover:text-primary-dark">📋 複製</button>
                  </div>
                  <textarea value={listing.description_en || ''} onChange={(e) => updateField('description_en', e.target.value)}
                    maxLength={160} rows={2}
                    className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm
                               focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary resize-none" />
                  <span className="text-xs text-gray-300">{(listing.description_en || '').length}/160</span>
                </div>
              </div>

              {/* 版權 */}
              <div>
                <div className="flex items-center justify-between mb-1">
                  <label className="text-xs text-gray-500">版權 Copyright（max 50 字元）</label>
                  <button onClick={() => handleCopy(listing.copyright)}
                    className="text-xs text-primary hover:text-primary-dark">📋 複製</button>
                </div>
                <input type="text" value={listing.copyright || ''} onChange={(e) => updateField('copyright', e.target.value)}
                  maxLength={50}
                  className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm
                             focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary" />
                <span className="text-xs text-gray-300">{(listing.copyright || '').length}/50</span>
              </div>

              {/* Tags */}
              {listing.tags?.length > 0 && (
                <div>
                  <div className="flex items-center justify-between mb-1">
                    <label className="text-xs text-gray-500">搜尋標籤 Tags</label>
                    <button onClick={() => handleCopy(listing.tags.join(', '))}
                      className="text-xs text-primary hover:text-primary-dark">📋 複製全部</button>
                  </div>
                  <div className="flex flex-wrap gap-1.5">
                    {listing.tags.map((tag, i) => (
                      <span key={i} className="px-2.5 py-1 bg-gray-100 text-gray-600 rounded-full text-xs">{tag}</span>
                    ))}
                  </div>
                </div>
              )}

              {/* 一鍵全部複製 */}
              <button onClick={() => {
                const all = [
                  `【中文標題】${listing.title_zh}`,
                  `【English Title】${listing.title_en}`,
                  `【中文說明】${listing.description_zh}`,
                  `【English Description】${listing.description_en}`,
                  `【版權】${listing.copyright || ''}`,
                  `【Tags】${(listing.tags || []).join(', ')}`,
                ].join('\n\n');
                navigator.clipboard.writeText(all);
                alert('已複製全部上架文案到剪貼簿！');
              }}
                className="w-full py-2 rounded-lg border border-primary text-primary text-sm font-medium
                           hover:bg-primary/5 transition">
                📋 一鍵複製全部上架文案
              </button>
            </div>
          )}
        </div>
      );
    }

    // ============================================================
    // StickerCanvas — Canvas-based sticker with draggable text
    // ============================================================

    function StickerCanvas({ imageDataUrl, caption, textSettings, position, onPositionChange, canvasW, canvasH }) {
      const cW = canvasW || CANVAS_W;
      const cH = canvasH || CANVAS_H;
      const canvasRef = useRef(null);
      const imgRef = useRef(null);
      const isDragging = useRef(false);
      const onPosRef = useRef(onPositionChange);
      onPosRef.current = onPositionChange;

      // Load image
      useEffect(() => {
        if (!imageDataUrl) { imgRef.current = null; draw(); return; }
        const img = new Image();
        img.onload = () => { imgRef.current = img; draw(); };
        img.src = imageDataUrl;
      }, [imageDataUrl]);

      // Redraw on text/position changes
      const sKey = `${textSettings.fontFamily}|${textSettings.fontSize}|${textSettings.fontColor}|${textSettings.strokeColor}|${textSettings.strokeWidth}`;
      useEffect(() => { draw(); }, [caption, sKey, position?.x, position?.y]);

      function draw() {
        const canvas = canvasRef.current;
        if (!canvas) return;
        drawStickerCanvas(canvas.getContext('2d'), imgRef.current, caption, textSettings, position, cW, cH);
      }

      // Coordinate helper
      function getPos(e) {
        const rect = canvasRef.current.getBoundingClientRect();
        const cx = (e.touches ? e.touches[0].clientX : e.clientX);
        const cy = (e.touches ? e.touches[0].clientY : e.clientY);
        return {
          x: Math.max(0.05, Math.min(0.95, ((cx - rect.left) / rect.width))),
          y: Math.max(0.05, Math.min(0.95, ((cy - rect.top) / rect.height))),
        };
      }

      function handleDown(e) {
        if (!caption) return;
        e.preventDefault();
        isDragging.current = true;
        onPosRef.current?.(getPos(e));
      }

      function handleMove(e) {
        if (!isDragging.current) return;
        e.preventDefault();
        onPosRef.current?.(getPos(e));
      }

      function handleUp() { isDragging.current = false; }

      // Document-level listeners for drag outside canvas
      useEffect(() => {
        const move = (e) => {
          if (!isDragging.current) return;
          const rect = canvasRef.current?.getBoundingClientRect();
          if (!rect) return;
          const cx = (e.touches ? e.touches[0].clientX : e.clientX);
          const cy = (e.touches ? e.touches[0].clientY : e.clientY);
          onPosRef.current?.({
            x: Math.max(0.05, Math.min(0.95, (cx - rect.left) / rect.width)),
            y: Math.max(0.05, Math.min(0.95, (cy - rect.top) / rect.height)),
          });
        };
        const up = () => { isDragging.current = false; };
        document.addEventListener('mousemove', move);
        document.addEventListener('mouseup', up);
        document.addEventListener('touchmove', move, { passive: false });
        document.addEventListener('touchend', up);
        return () => {
          document.removeEventListener('mousemove', move);
          document.removeEventListener('mouseup', up);
          document.removeEventListener('touchmove', move);
          document.removeEventListener('touchend', up);
        };
      }, []);

      return (
        <div className="canvas-wrap">
          <canvas ref={canvasRef} width={cW} height={cH}
            onMouseDown={handleDown} onTouchStart={handleDown} />
        </div>
      );
    }

    // ============================================================
    // TextControls — Font, size, color, stroke, layout
    // ============================================================

    function TextControls({ textSettings, setTextSettings, applyLayout }) {
      const update = (key, val) => setTextSettings(prev => ({ ...prev, [key]: val }));

      return (
        <div className="ctrl-section">
          <div className="flex flex-wrap items-end gap-x-5 gap-y-3">
            {/* Font */}
            <div>
              <span className="ctrl-label">字體</span>
              <select value={textSettings.fontFamily}
                onChange={(e) => update('fontFamily', e.target.value)}
                className="border border-gray-200 rounded-lg px-3 py-2 text-sm">
                {FONTS.map(f => (
                  <option key={f.id} value={f.family}>{f.label}</option>
                ))}
              </select>
            </div>

            {/* Size */}
            <div>
              <span className="ctrl-label">大小 {textSettings.fontSize}px</span>
              <input type="range" min="16" max="64" value={textSettings.fontSize}
                onChange={(e) => update('fontSize', Number(e.target.value))} className="w-24" />
            </div>

            {/* Font Color */}
            <div>
              <span className="ctrl-label">文字色</span>
              <input type="color" value={textSettings.fontColor}
                onChange={(e) => update('fontColor', e.target.value)} />
            </div>

            {/* Stroke Color */}
            <div>
              <span className="ctrl-label">描邊色</span>
              <input type="color" value={textSettings.strokeColor}
                onChange={(e) => update('strokeColor', e.target.value)} />
            </div>

            {/* Stroke Width */}
            <div>
              <span className="ctrl-label">描邊 {textSettings.strokeWidth}px</span>
              <input type="range" min="0" max="12" value={textSettings.strokeWidth}
                onChange={(e) => update('strokeWidth', Number(e.target.value))} className="w-20" />
            </div>

            {/* Layout Presets */}
            <div>
              <span className="ctrl-label">排版（全部套用）</span>
              <div className="flex gap-1.5">
                {LAYOUT_PRESETS.map(l => (
                  <button key={l.id} onClick={() => applyLayout(l.pos)}
                    title={l.label}
                    className="w-8 h-8 rounded-lg bg-gray-100 hover:bg-gray-200 transition
                               flex items-center justify-center text-sm">
                    {l.icon}
                  </button>
                ))}
              </div>
            </div>
          </div>

          {/* Font Preview */}
          <div className="mt-3 flex gap-2 flex-wrap">
            {FONTS.map(f => (
              <span key={f.id}
                onClick={() => update('fontFamily', f.family)}
                className={`px-3 py-1 rounded-full text-sm cursor-pointer transition ${
                  textSettings.fontFamily === f.family
                    ? 'bg-primary/10 text-primary ring-1 ring-primary/30'
                    : 'bg-gray-50 text-gray-500 hover:bg-gray-100'
                }`}
                style={{ fontFamily: `"${f.family}", "Noto Sans TC", sans-serif` }}>
                {f.label} 永不放棄
              </span>
            ))}
          </div>

          <div className="text-xs text-gray-400 mt-2">
            💡 拖曳貼圖上的文字可調整個別位置 ・ 排版按鈕會套用到所有貼圖
          </div>
        </div>
      );
    }

    // ============================================================
    // Mount
    // ============================================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
