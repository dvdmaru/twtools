    const LAYOUT_PRESETS = [
      { id: 'bottom',    label: '底部', icon: '⬇️', pos: { x: 0.5, y: 0.85 } },
      { id: 'top',       label: '頂部', icon: '⬆️', pos: { x: 0.5, y: 0.15 } },
      { id: 'center',    label: '置中', icon: '⏺️', pos: { x: 0.5, y: 0.50 } },
      { id: 'top-right', label: '右上', icon: '↗️', pos: { x: 0.78, y: 0.18 } },
    ];

    const STYLE_PROMPTS = {
      'original':  'in the same art style as the reference image, maintaining original aesthetic',
      'chibi':     'in chibi/super-deformed style with a disproportionately big head and small body, cute round proportions, simple features',
      'manga-jp':  'in Japanese manga/anime style with detailed linework, large expressive eyes, clean cel-shading',
      'manga-kr':  'in Korean manhwa style with soft color tones, semi-realistic proportions, fashionable appearance',
      'manga-us':  'in American cartoon/comic style with bold outlines, vibrant saturated colors, exaggerated features',
      'ink-wash':  'in traditional Chinese ink wash painting style with black ink strokes, watercolor washes, minimalist elegance',
      'disney':    'in Pixar/Disney 3D animation style with smooth rendering, warm lighting, charming character design',
      'pixel':     'in retro pixel art style with visible square pixels, limited color palette, 8-bit/16-bit game aesthetic',
      '3d-render': 'in high-quality 3D rendered style with realistic lighting, smooth surfaces, subtle shadows, clay-like material',
      'realistic': 'in semi-realistic illustration style with detailed lighting, soft shadows, photographic quality',
    };

    // ============================================================
    // Utility: Smart Background Removal (sample corners → targeted removal)
    // ============================================================

    /**
     * 智慧去背：取樣四角偵測背景色，精準移除該顏色。
     * 比 ML 模型更準確（不會誤切角色），比「去白」更通用（支援灰色/任何背景）。
     * @param {string} dataUrl - image data URL
     * @param {number} tolerance - 容差 (0-100)，值越大移除範圍越寬
     * @returns {Promise<string>} transparent PNG data URL
     */
    function removeBackgroundSmart(dataUrl, tolerance = 25) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const c = document.createElement('canvas');
          c.width = img.width;
          c.height = img.height;
          const ctx = c.getContext('2d');
          ctx.drawImage(img, 0, 0);
          const imageData = ctx.getImageData(0, 0, c.width, c.height);
          const d = imageData.data;
          const w = c.width, h = c.height;

          // Step 1: 取樣四角（每角取 5×5 像素取中位數），偵測背景色
          const sampleSize = 5;
          const corners = [
            [0, 0],                          // top-left
            [w - sampleSize, 0],             // top-right
            [0, h - sampleSize],             // bottom-left
            [w - sampleSize, h - sampleSize] // bottom-right
          ];

          const samples = [];
          for (const [cx, cy] of corners) {
            for (let dy = 0; dy < sampleSize; dy++) {
              for (let dx = 0; dx < sampleSize; dx++) {
                const idx = ((cy + dy) * w + (cx + dx)) * 4;
                samples.push([d[idx], d[idx + 1], d[idx + 2]]);
              }
            }
          }

          // 取中位數作為背景色（比平均更抗干擾）
          samples.sort((a, b) => (a[0] + a[1] + a[2]) - (b[0] + b[1] + b[2]));
          const mid = Math.floor(samples.length / 2);
          const bgR = samples[mid][0], bgG = samples[mid][1], bgB = samples[mid][2];

          // Step 2: 計算每個像素與背景色的色差，透明化
          // Chroma key green (#00B140) 與自然色差距 >200，tolerance * 2.5 足夠
          const t = tolerance * 2.5;      // 主要移除區（完全透明）
          const t2 = t * 1.3;             // 柔邊過渡區（半透明漸變，窄一點避免誤切）

          for (let i = 0; i < d.length; i += 4) {
            const dist = Math.sqrt(
              (bgR - d[i]) ** 2 + (bgG - d[i + 1]) ** 2 + (bgB - d[i + 2]) ** 2
            );
            if (dist < t) {
              d[i + 3] = 0; // 完全透明
            } else if (dist < t2) {
              // 柔邊：越靠近背景色越透明
              const alpha = Math.round(((dist - t) / (t2 - t)) * 255);
              d[i + 3] = Math.min(d[i + 3], alpha);
            }
          }

          ctx.putImageData(imageData, 0, 0);
          resolve(c.toDataURL('image/png'));
        };
        img.src = dataUrl;
      });
    }

    // 保留舊版快速去白（向後相容）
    function removeWhiteBackground(dataUrl, tolerance = 30) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const c = document.createElement('canvas');
          c.width = img.width;
          c.height = img.height;
          const ctx = c.getContext('2d');
          ctx.drawImage(img, 0, 0);
          const imageData = ctx.getImageData(0, 0, c.width, c.height);
          const d = imageData.data;
          const t = tolerance * 4.41;
          const t2 = t * 1.6;
          for (let i = 0; i < d.length; i += 4) {
            const dist = Math.sqrt(
              (255 - d[i]) ** 2 + (255 - d[i + 1]) ** 2 + (255 - d[i + 2]) ** 2
            );
            if (dist < t) {
              d[i + 3] = 0;
            } else if (dist < t2) {
              const alpha = Math.round(((dist - t) / (t2 - t)) * 255);
              d[i + 3] = Math.min(d[i + 3], alpha);
            }
          }
          ctx.putImageData(imageData, 0, 0);
          resolve(c.toDataURL('image/png'));
        };
        img.src = dataUrl;
      });
    }

    // ============================================================
    // Utility: Draw sticker canvas (image + text)
    // ============================================================

    function drawStickerCanvas(ctx, img, caption, textSettings, position) {
      const W = CANVAS_W, H = CANVAS_H;
      ctx.clearRect(0, 0, W, H);

      if (img) {
        const scale = Math.min(W / img.width, H / img.height);
        const w = img.width * scale;
        const h = img.height * scale;
        ctx.drawImage(img, (W - w) / 2, (H - h) / 2, w, h);
      }

      if (caption && caption.trim()) {
        const { fontFamily, fontSize, fontColor, strokeColor, strokeWidth } = textSettings;
        const x = position.x * W;
        const y = position.y * H;

        ctx.save();
        ctx.font = `bold ${fontSize}px "${fontFamily}", "Noto Sans TC", sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        if (strokeWidth > 0) {
          ctx.strokeStyle = strokeColor;
          ctx.lineWidth = strokeWidth * 2;
          ctx.lineJoin = 'round';
          ctx.miterLimit = 2;
          ctx.strokeText(caption, x, y);
        }

        ctx.fillStyle = fontColor;
        ctx.fillText(caption, x, y);
        ctx.restore();
      }
    }

    // ============================================================
    // P4: Export utilities — renderFinalSticker, main/tab, ZIP
    // ============================================================

    const MARGIN = 10; // 10px safety margin for LINE stickers
    const MAIN_SIZE = 240;  // main.png: 240×240
    const TAB_W = 96;       // tab.png: 96×74
    const TAB_H = 74;

    /**
     * Render a final sticker PNG with 10px safety margin.
     * Takes the processed (bg-removed) image + caption + settings,
     * draws onto a 370×320 canvas with content shrunk to fit within margins.
     * Returns a PNG data URL.
     */
    function renderFinalSticker(processedImageDataUrl, caption, textSettings, position) {
      return new Promise((resolve) => {
        const canvas = document.createElement('canvas');
        canvas.width = CANVAS_W;
        canvas.height = CANVAS_H;
        const ctx = canvas.getContext('2d');

        if (!processedImageDataUrl) {
          // Empty sticker — just resolve transparent
          resolve(canvas.toDataURL('image/png'));
          return;
        }

        const img = new Image();
        img.onload = () => {
          ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

          // Draw image with margin: scale to fit within (W - 2*MARGIN) × (H - 2*MARGIN)
          const innerW = CANVAS_W - MARGIN * 2;
          const innerH = CANVAS_H - MARGIN * 2;
          const scale = Math.min(innerW / img.width, innerH / img.height);
          const w = img.width * scale;
          const h = img.height * scale;
          const x = MARGIN + (innerW - w) / 2;
          const y = MARGIN + (innerH - h) / 2;
          ctx.drawImage(img, x, y, w, h);

          // Draw text (same logic as drawStickerCanvas but with margin-aware positioning)
          if (caption && caption.trim()) {
            const { fontFamily, fontSize, fontColor, strokeColor, strokeWidth } = textSettings;
            const tx = position.x * CANVAS_W;
            const ty = position.y * CANVAS_H;

            ctx.save();
            ctx.font = `bold ${fontSize}px "${fontFamily}", "Noto Sans TC", sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            if (strokeWidth > 0) {
              ctx.strokeStyle = strokeColor;
              ctx.lineWidth = strokeWidth * 2;
              ctx.lineJoin = 'round';
              ctx.miterLimit = 2;
              ctx.strokeText(caption, tx, ty);
            }
            ctx.fillStyle = fontColor;
            ctx.fillText(caption, tx, ty);
            ctx.restore();
          }

          resolve(canvas.toDataURL('image/png'));
        };
        img.onerror = () => resolve(canvas.toDataURL('image/png'));
        img.src = processedImageDataUrl;
      });
    }

    /**
     * Generate main.png (240×240) from a sticker data URL.
     * Center-crops to square, then scales to 240×240.
     */
    function generateMainImage(stickerDataUrl) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = MAIN_SIZE;
          canvas.height = MAIN_SIZE;
          const ctx = canvas.getContext('2d');

          // Center-crop to square from 370×320
          const srcSize = Math.min(img.width, img.height); // 320
          const sx = (img.width - srcSize) / 2;   // (370-320)/2 = 25
          const sy = (img.height - srcSize) / 2;   // 0
          ctx.drawImage(img, sx, sy, srcSize, srcSize, 0, 0, MAIN_SIZE, MAIN_SIZE);

          resolve(canvas.toDataURL('image/png'));
        };
        img.src = stickerDataUrl;
      });
    }

    /**
     * Generate tab.png (96×74) from a sticker data URL.
     * Scales to fit within 96×74, centered on transparent background.
     */
    function generateTabImage(stickerDataUrl) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = TAB_W;
          canvas.height = TAB_H;
          const ctx = canvas.getContext('2d');

          // Scale entire sticker to fit within tab dimensions
          const scale = Math.min(TAB_W / img.width, TAB_H / img.height);
          const w = img.width * scale;
          const h = img.height * scale;
          ctx.drawImage(img, (TAB_W - w) / 2, (TAB_H - h) / 2, w, h);

          resolve(canvas.toDataURL('image/png'));
        };
        img.src = stickerDataUrl;
      });
    }

    /**
     * Convert a data URL to a Uint8Array (for JSZip).
     */
    function dataUrlToUint8Array(dataUrl) {
      const base64 = dataUrl.split(',')[1];
      const binary = atob(base64);
      const arr = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) arr[i] = binary.charCodeAt(i);
      return arr;
    }

    /**
     * Build and download LINE sticker ZIP package.
     * Structure: 01.png ~ N.png (stickers), main.png, tab.png
     */
    async function buildStickerZip({
      processedImages, generatedImages, captions, textSettings, textPositions,
      stickerCount, mainSourceIndex, tabSourceIndex, onProgress
    }) {
      const zip = new JSZip();
      const total = stickerCount + 2; // stickers + main + tab
      let done = 0;

      // 1. Render each sticker with margin
      for (let i = 0; i < stickerCount; i++) {
        const srcImage = processedImages[i] || generatedImages[i];
        if (!srcImage) continue;

        const finalDataUrl = await renderFinalSticker(
          srcImage, captions[i], textSettings, textPositions[i]
        );
        const filename = String(i + 1).padStart(2, '0') + '.png';
        zip.file(filename, dataUrlToUint8Array(finalDataUrl));

        done++;
        onProgress?.({ done, total, step: `貼圖 ${filename}` });
      }

      // 2. Generate main.png from selected sticker
      const mainSrc = processedImages[mainSourceIndex] || generatedImages[mainSourceIndex];
      if (mainSrc) {
        const mainSticker = await renderFinalSticker(
          mainSrc, captions[mainSourceIndex], textSettings, textPositions[mainSourceIndex]
        );
        const mainDataUrl = await generateMainImage(mainSticker);
        zip.file('main.png', dataUrlToUint8Array(mainDataUrl));
      }
      done++;
      onProgress?.({ done, total, step: 'main.png' });

      // 3. Generate tab.png from selected sticker
      const tabSrc = processedImages[tabSourceIndex] || generatedImages[tabSourceIndex];
      if (tabSrc) {
        const tabSticker = await renderFinalSticker(
          tabSrc, captions[tabSourceIndex], textSettings, textPositions[tabSourceIndex]
        );
        const tabDataUrl = await generateTabImage(tabSticker);
        zip.file('tab.png', dataUrlToUint8Array(tabDataUrl));
      }
      done++;
      onProgress?.({ done, total, step: 'tab.png' });

      // 4. Generate and trigger download
      const blob = await zip.generateAsync({ type: 'blob' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `line-stickers-${stickerCount}pack.zip`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      return { fileCount: done, zipSize: blob.size };
    }

    // ============================================================
    // App
    // ============================================================

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [referenceImage, setReferenceImage] = useState(null);
      const [selectedStyle, setSelectedStyle] = useState(null);
      const [captions, setCaptions] = useState(Array(32).fill(''));
      const [captionMeta, setCaptionMeta] = useState(Array(32).fill(null));
      const [captionTheme, setCaptionTheme] = useState('daily'); // 追蹤使用者選的文案主題
      const [generatedImages, setGeneratedImages] = useState(Array(32).fill(null));
      const [stickerCount, setStickerCount] = useState(16);
      const [isGenerating, setIsGenerating] = useState(false);
      const [generateProgress, setGenerateProgress] = useState({ current: 0, total: 0, errors: [] });

      // P3 state
      const [processedImages, setProcessedImages] = useState(Array(32).fill(null));
      const [textSettings, setTextSettings] = useState({
        fontFamily: 'Noto Sans TC', fontSize: 36,
        fontColor: '#FFFFFF', strokeColor: '#000000', strokeWidth: 4,
      });
      const [textPositions, setTextPositions] = useState(
        Array(32).fill(null).map(() => ({ x: 0.5, y: 0.85 }))
      );
      const [bgMethod, setBgMethod] = useState('smart'); // smart = 智慧去背（預設）, ml = AI 去背, white = 快速去白
      const [bgTolerance, setBgTolerance] = useState(20);
      const [selectedSticker, setSelectedSticker] = useState(null);
      const [isProcessingBg, setIsProcessingBg] = useState(false);

      // P4 state
      const [mainSource, setMainSource] = useState(0);
      const [tabSource, setTabSource] = useState(0);
      const [isExporting, setIsExporting] = useState(false);
      const [exportProgress, setExportProgress] = useState(null);

      // P5 state: LINE listing
      const [listing, setListing] = useState(null);
      const [isGeneratingListing, setIsGeneratingListing] = useState(false);

      // P6 state: 單張自訂提示詞
      const [stickerHints, setStickerHints] = useState(Array(32).fill(''));

      const canProceed = () => {
        switch (currentStep) {
          case 0: return !!referenceImage;
          case 1: return !!selectedStyle;
          case 2: return captions.slice(0, stickerCount).filter(c => c.trim()).length >= stickerCount;
          default: return false;
        }
      };

      // Auto background removal for newly generated images
      useEffect(() => {
        let cancelled = false;
        const hasNew = generatedImages.some((img, i) => img && !processedImages[i]);
        if (!hasNew) return;

        (async () => {
          if (bgMethod === 'smart') {
            // 智慧去背：取樣四角偵測背景色，精準移除
            const next = [...processedImages];
            let changed = false;
            for (let i = 0; i < stickerCount; i++) {
              if (cancelled) break;
              if (generatedImages[i] && !next[i]) {
                next[i] = await removeBackgroundSmart(generatedImages[i], bgTolerance);
                changed = true;
                if (!cancelled) setProcessedImages([...next]);
              }
            }
          } else if (bgMethod === 'ml') {
            // ML auto-removal
            if (typeof window.removeBackgroundML !== 'function') return;
            setIsProcessingBg(true);
            const next = [...processedImages];
            for (let i = 0; i < stickerCount; i++) {
              if (cancelled) break;
              if (generatedImages[i] && !next[i]) {
                try {
                  next[i] = await window.removeBackgroundML(generatedImages[i]);
                  if (!cancelled) setProcessedImages([...next]);
                } catch (err) {
                  console.error(`ML bg removal #${i + 1} failed:`, err);
                }
              }
            }
            if (!cancelled) setIsProcessingBg(false);
          } else {
            // White bg auto-removal
            const next = [...processedImages];
            let changed = false;
            for (let i = 0; i < stickerCount; i++) {
              if (cancelled) break;
              if (generatedImages[i] && !next[i]) {
                next[i] = await removeWhiteBackground(generatedImages[i], bgTolerance);
                changed = true;
              }
            }
            if (changed && !cancelled) setProcessedImages([...next]);
          }
        })();
        return () => { cancelled = true; };
      }, [generatedImages, stickerCount]);

      // Reprocess all when tolerance changes (debounced)
      const tolTimer = useRef(null);
      const handleToleranceChange = (val) => {
        setBgTolerance(val);
        if (tolTimer.current) clearTimeout(tolTimer.current);
        tolTimer.current = setTimeout(async () => {
          if (bgMethod !== 'white' && bgMethod !== 'smart') return;
          const removeFn = bgMethod === 'smart' ? removeBackgroundSmart : removeWhiteBackground;
          const next = [];
          for (let i = 0; i < stickerCount; i++) {
            next[i] = generatedImages[i]
              ? await removeFn(generatedImages[i], val)
              : null;
          }
          setProcessedImages(next);
        }, 400);
      };

      // ML background removal
      const handleMLRemoval = async () => {
        if (typeof window.removeBackgroundML !== 'function') {
          alert('ML 去背模組尚未載入完成，請稍後再試。');
          return;
        }
        setIsProcessingBg(true);
        const next = [...processedImages];
        for (let i = 0; i < stickerCount; i++) {
          if (!generatedImages[i]) continue;
          try {
            next[i] = await window.removeBackgroundML(generatedImages[i]);
            setProcessedImages([...next]);
          } catch (err) {
            console.error(`ML bg removal #${i + 1} failed:`, err);
          }
        }
        setIsProcessingBg(false);
      };

      const applyLayout = (pos) => {
        setTextPositions(prev => prev.map(() => ({ ...pos })));
      };

      const updatePosition = useCallback((index, pos) => {
        setTextPositions(prev => {
          const next = [...prev];
          next[index] = pos;
          return next;
        });
      }, []);

      return (
        <div className="max-w-5xl mx-auto px-4 py-8">
          <header className="text-center mb-8">
            <h1 className="text-3xl font-bold text-gray-900 mb-2">🎨 LINE Sticker Maker</h1>
            <p className="text-gray-500 text-sm">AI 生角色圖 × 程式疊文字 — 貼圖文字正確率 100%</p>
          </header>

          <StepIndicator steps={STEPS} current={currentStep} />

          <div className="mt-8">
            {currentStep === 0 && (
              <StepUpload referenceImage={referenceImage} setReferenceImage={setReferenceImage}
                stickerCount={stickerCount} setStickerCount={setStickerCount} />
            )}
            {currentStep === 1 && (
              <StepStyle selectedStyle={selectedStyle} setSelectedStyle={setSelectedStyle} />
            )}
            {currentStep === 2 && (
              <StepCaptions captions={captions} setCaptions={setCaptions}
                captionMeta={captionMeta} setCaptionMeta={setCaptionMeta}
                stickerCount={stickerCount}
                captionTheme={captionTheme} setCaptionTheme={setCaptionTheme} />
            )}
            {currentStep === 3 && (
              <StepPreview
                referenceImage={referenceImage} selectedStyle={selectedStyle}
                captions={captions} captionMeta={captionMeta} captionTheme={captionTheme}
                generatedImages={generatedImages} setGeneratedImages={setGeneratedImages}
                processedImages={processedImages} setProcessedImages={setProcessedImages}
                stickerCount={stickerCount}
                isGenerating={isGenerating} setIsGenerating={setIsGenerating}
                generateProgress={generateProgress} setGenerateProgress={setGenerateProgress}
                textSettings={textSettings} setTextSettings={setTextSettings}
                textPositions={textPositions} updatePosition={updatePosition} applyLayout={applyLayout}
                bgMethod={bgMethod} setBgMethod={setBgMethod}
                bgTolerance={bgTolerance} handleToleranceChange={handleToleranceChange}
                handleMLRemoval={handleMLRemoval} isProcessingBg={isProcessingBg}
                selectedSticker={selectedSticker} setSelectedSticker={setSelectedSticker}
                mainSource={mainSource} setMainSource={setMainSource}
                tabSource={tabSource} setTabSource={setTabSource}
                isExporting={isExporting} setIsExporting={setIsExporting}
                exportProgress={exportProgress} setExportProgress={setExportProgress}
                listing={listing} setListing={setListing}
                isGeneratingListing={isGeneratingListing} setIsGeneratingListing={setIsGeneratingListing}
                stickerHints={stickerHints} setStickerHints={setStickerHints}
              />
            )}
          </div>

          <div className="flex justify-between mt-8">
            <button onClick={() => setCurrentStep(s => Math.max(0, s - 1))}
              disabled={currentStep === 0}
              className="px-6 py-2.5 rounded-lg border border-gray-300 text-gray-700 font-medium
                         disabled:opacity-30 disabled:cursor-not-allowed hover:bg-gray-50 transition">
              ← 上一步
            </button>
            {currentStep < 3 ? (
              <button onClick={() => setCurrentStep(s => Math.min(3, s + 1))}
                disabled={!canProceed()}
                className="px-6 py-2.5 rounded-lg bg-primary text-white font-medium
                           disabled:opacity-40 disabled:cursor-not-allowed hover:bg-primary-dark transition">
                下一步 →
              </button>
            ) : <div />}
          </div>

          <footer className="text-center mt-12 text-gray-400 text-xs">
            LINE Sticker Maker — Built with Gemini Imagen + Canvas
          </footer>
        </div>
      );
    }

    // ============================================================
    // StepIndicator
    // ============================================================

    function StepIndicator({ steps, current }) {
      return (
        <div className="flex justify-center">
          <div className="step-indicator">
            {steps.map((label, i) => (
              <React.Fragment key={i}>
                {i > 0 && <div className={`step-line ${i <= current ? 'completed' : ''}`} />}
                <div className="flex flex-col items-center gap-1">
                  <div className={`step-dot ${i < current ? 'completed' : i === current ? 'active' : 'pending'}`}>
                    {i < current ? '✓' : i + 1}
                  </div>
                  <span className={`text-xs ${i <= current ? 'text-primary font-medium' : 'text-gray-400'}`}>{label}</span>
                </div>
              </React.Fragment>
            ))}
          </div>
        </div>
      );
    }

    // ============================================================
    // Step 0: Upload
    // ============================================================

    function StepUpload({ referenceImage, setReferenceImage, stickerCount, setStickerCount }) {
      const fileInputRef = useRef(null);
      const handleFile = (file) => {
        if (!file || !file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = (e) => setReferenceImage({ dataUrl: e.target.result, file });
        reader.readAsDataURL(file);
      };

      return (
        <div className="space-y-6">
          <div className="text-center">
            <h2 className="text-xl font-bold text-gray-900 mb-1">上傳角色參考圖</h2>
            <p className="text-gray-500 text-sm">AI 會根據這張圖生成同一角色的不同表情和動作</p>
          </div>
          <div
            onDrop={(e) => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); }}
            onDragOver={(e) => e.preventDefault()}
            onClick={() => fileInputRef.current?.click()}
            className="border-2 border-dashed border-gray-300 rounded-2xl p-12
                       flex flex-col items-center justify-center cursor-pointer
                       hover:border-primary hover:bg-green-50/50 transition">
            {referenceImage ? (
              <div className="text-center">
                <img src={referenceImage.dataUrl} alt="參考圖" className="max-h-64 rounded-lg shadow-md mx-auto mb-4" />
                <p className="text-sm text-gray-500">{referenceImage.file.name} — 點擊重新選擇</p>
              </div>
            ) : (
              <>
                <div className="text-5xl mb-4">📤</div>
                <p className="text-gray-700 font-medium">拖曳圖片到這裡，或點擊選擇檔案</p>
                <p className="text-gray-400 text-sm mt-1">支援 PNG / JPG / WebP</p>
              </>
            )}
            <input ref={fileInputRef} type="file" accept="image/*"
              onChange={(e) => handleFile(e.target.files[0])} className="hidden" />
          </div>
          <div className="flex items-center justify-center gap-4">
            <span className="text-sm text-gray-600">貼圖張數：</span>
            {[2, 8, 16, 24, 32].map(n => (
              <button key={n} onClick={() => setStickerCount(n)}
                className={`px-4 py-1.5 rounded-full text-sm font-medium transition ${
                  stickerCount === n ? 'bg-primary text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                }`}>{n} 張</button>
            ))}
          </div>
        </div>
      );
    }

    // ============================================================
    // Step 1: Style
    // ============================================================

    function StepStyle({ selectedStyle, setSelectedStyle }) {
      return (
        <div className="space-y-6">
          <div className="text-center">
            <h2 className="text-xl font-bold text-gray-900 mb-1">選擇畫風</h2>
            <p className="text-gray-500 text-sm">AI 會將你的角色轉換為選定的畫風</p>
          </div>
          <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-3">
            {ART_STYLES.map(s => (
              <div key={s.id} onClick={() => setSelectedStyle(s.id)}
                className={`style-card ${selectedStyle === s.id ? 'selected' : ''}`}>
                <div className="text-3xl mb-2">{s.emoji}</div>
                <div className="font-medium text-sm text-gray-900">{s.label}</div>
                <div className="text-xs text-gray-400 mt-1">{s.desc}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ============================================================
    // Step 2: Captions
    // ============================================================

    function StepCaptions({ captions, setCaptions, captionMeta, setCaptionMeta, stickerCount, captionTheme, setCaptionTheme }) {
      const theme = captionTheme;
      const setTheme = setCaptionTheme;
      const [captionStyle, setCaptionStyle] = useState('mixed');
      const [customThemeText, setCustomThemeText] = useState('');
      const [isGenerating, setIsGenerating] = useState(false);

      const updateCaption = (index, value) => {
        const next = [...captions];
        next[index] = value;
        setCaptions(next);
      };

      // 取得實際傳給 API 的主題文字
      const getThemeLabel = () => {
        if (theme === 'custom') return customThemeText || '日常生活';
        return CAPTION_THEMES.find(t => t.id === theme)?.label || theme;
      };

      const handleAIGenerate = async () => {
        if (theme === 'custom' && !customThemeText.trim()) {
          alert('請輸入自訂主題內容');
          return;
        }
        setIsGenerating(true);
        try {
          const res = await fetch(`${WORKER_URL}/generate-captions`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              theme: getThemeLabel(),
              count: stickerCount, language: 'zh-TW',
              style: CAPTION_STYLES.find(s => s.id === captionStyle)?.label || captionStyle,
              trending: theme === 'trending', // 告訴 Worker 啟用時事流行梗模式
            }),
          });
          const data = await res.json();
          if (data.captions?.length) {
            const nextC = [...captions];
            const nextM = [...captionMeta];
            data.captions.slice(0, stickerCount).forEach((item, i) => {
              const text = item.text || item;
              nextC[i] = text;
              nextM[i] = { mood: item.mood || 'neutral', action: item.action || 'standing with a gentle expression', originalText: text };
            });
            setCaptions(nextC);
            setCaptionMeta(nextM);
          }
        } catch (err) {
          console.error('Generate captions error:', err);
          alert('文案生成失敗：' + err.message);
        } finally {
          setIsGenerating(false);
        }
      };

      const filledCount = captions.slice(0, stickerCount).filter(c => c.trim()).length;

      return (
        <div className="space-y-6">
          <div className="text-center">
            <h2 className="text-xl font-bold text-gray-900 mb-1">編輯貼圖文案</h2>
            <p className="text-gray-500 text-sm">AI 生成候選文案，你也可以自由編輯每一句</p>
          </div>

          {/* 主題選擇區（chip 樣式） */}
          <div className="bg-white rounded-xl p-4 shadow-sm border border-gray-100 space-y-3">
            <div>
              <label className="text-xs text-gray-500 block mb-2">選擇主題</label>
              <div className="flex flex-wrap gap-2">
                {CAPTION_THEMES.map(t => (
                  <button key={t.id} onClick={() => setTheme(t.id)}
                    className={`px-3 py-1.5 rounded-full text-sm font-medium transition flex items-center gap-1 ${
                      theme === t.id
                        ? 'bg-primary text-white shadow-sm'
                        : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                    }`}>
                    <span>{t.emoji}</span> {t.label}
                  </button>
                ))}
              </div>
            </div>

            {/* 自訂主題輸入框 */}
            {theme === 'custom' && (
              <div>
                <label className="text-xs text-gray-500 block mb-1">輸入你的主題（例如：健身教練、咖啡成癮、追劇日常）</label>
                <input type="text" value={customThemeText}
                  onChange={(e) => setCustomThemeText(e.target.value)}
                  placeholder="描述你想要的貼圖主題..."
                  maxLength={50}
                  className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm
                             focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary" />
              </div>
            )}

            {/* 時事流行梗提示 */}
            {theme === 'trending' && (
              <div className="text-xs text-amber-600 bg-amber-50 rounded-lg px-3 py-2">
                🔥 AI 會融入近期台灣網路流行用語、迷因梗和時事哏，文案可能需要微調以確保時效性
              </div>
            )}

            {/* 風格 + 生成按鈕 */}
            <div className="flex flex-wrap items-end gap-4 pt-1">
              <div>
                <label className="text-xs text-gray-500 block mb-1">文案風格</label>
                <select value={captionStyle} onChange={(e) => setCaptionStyle(e.target.value)}
                  className="border border-gray-200 rounded-lg px-3 py-2 text-sm">
                  {CAPTION_STYLES.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}
                </select>
              </div>
              <button onClick={handleAIGenerate} disabled={isGenerating || (theme === 'custom' && !customThemeText.trim())}
                className="px-4 py-2 rounded-lg bg-primary text-white text-sm font-medium
                           disabled:opacity-50 hover:bg-primary-dark transition">
                {isGenerating ? '⏳ 生成中...' : '✨ AI 生成文案'}
              </button>
              <div className="ml-auto text-sm text-gray-400">{filledCount}/{stickerCount} 句</div>
            </div>
          </div>

          {/* 文案編輯欄位 */}
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
            {Array.from({ length: stickerCount }).map((_, i) => (
              <div key={i} className="relative">
                <span className="absolute top-2 left-3 text-xs text-gray-300 font-mono">
                  {String(i + 1).padStart(2, '0')}
                </span>
                <input type="text" value={captions[i] || ''}
                  onChange={(e) => updateCaption(i, e.target.value)}
                  placeholder="輸入文案..." maxLength={20}
                  className="w-full border border-gray-200 rounded-lg px-3 pt-7 pb-2 text-sm
                             focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary" />
                <span className="absolute bottom-2 right-3 text-xs text-gray-300">
                  {(captions[i] || '').length}/20
                </span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ============================================================
    // Step 3: Preview & Generate (P3 rewrite)
    // ============================================================

    function StepPreview({
      referenceImage, selectedStyle, captions, captionMeta, captionTheme,
      generatedImages, setGeneratedImages,
      processedImages, setProcessedImages,
      stickerCount, isGenerating, setIsGenerating,
      generateProgress, setGenerateProgress,
      textSettings, setTextSettings,
      textPositions, updatePosition, applyLayout,
      bgMethod, setBgMethod, bgTolerance, handleToleranceChange,
      handleMLRemoval, isProcessingBg,
      selectedSticker, setSelectedSticker,
      mainSource, setMainSource, tabSource, setTabSource,
      isExporting, setIsExporting, exportProgress, setExportProgress,
      listing, setListing, isGeneratingListing, setIsGeneratingListing,
      stickerHints, setStickerHints,
    }) {
      const styleName = ART_STYLES.find(s => s.id === selectedStyle)?.label || selectedStyle;
      const stylePrompt = STYLE_PROMPTS[selectedStyle] || STYLE_PROMPTS['original'];
      const abortRef = useRef(false);
      const [fontsReady, setFontsReady] = useState(false);

      useEffect(() => { document.fonts.ready.then(() => setFontsReady(true)); }, []);

      // === Image generation (unchanged logic) ===
      // 主題 → 場景提示（前端層雙保險，即使 Worker 的 action 沒帶入服裝也能靠這個）
      const THEME_SCENE_HINTS = {
        'daily':     'The character is in a casual everyday setting.',
        'work':      'The character is in a workplace/office setting, wearing business or office attire.',
        'school':    'The character is in a school setting, wearing a school uniform (white shirt, plaid skirt or pants).',
        'love':      'The character is in a romantic setting, wearing cute casual clothes.',
        'festive':   'The character is in a festive/holiday setting, wearing festive outfit.',
        'motivate':  'The character is in a bright positive setting, wearing cheerful casual clothes.',
        'sarcasm':   'The character looks exhausted, wearing pajamas or oversized hoodie.',
        'pets':      'The character is interacting with a pet or in a cozy home setting, wearing casual comfortable clothes.',
        'food':      'The character is in a food/dining setting, wearing a cute apron or casual clothes, near food or drinks.',
        'sports':    'The character is in a gym or outdoor sports setting, wearing athletic sportswear.',
        'travel':    'The character is in a travel/outdoor adventure setting, wearing travel outfit with a backpack or hat.',
        'gaming':    'The character is in a gaming/desk setup, wearing a hoodie or casual gamer outfit, with headphones.',
        'trending':  'The character is in a trendy modern setting, wearing fashionable streetwear.',
      };
      const sceneHint = THEME_SCENE_HINTS[captionTheme] || '';

      const buildPrompt = (index, extraHint = '') => {
        const meta = captionMeta[index];
        const caption = captions[index] || '';
        const originalText = meta?.originalText || '';
        // 如果使用者手動修改了文案，用修改後的文字推導情緒，不依賴過期的 captionMeta
        const wasEdited = caption !== originalText && originalText !== '';
        const moodStr = wasEdited ? '' : (meta?.mood || 'neutral');
        const actionStr = wasEdited ? '' : (meta?.action || 'standing with a gentle expression');
        return [
          `IMPORTANT: Look at the reference image carefully. Identify the character's SPECIES (cat, dog, rabbit, human, etc.), body shape, color palette, and key visual features. You MUST preserve ALL of these in your output.`,
          '',
          `Based on the reference character image provided, generate a single character illustration ${stylePrompt}.`,
          `The character MUST be the SAME species and type as the reference — if it is a cat, draw a cat; if it is a dog, draw a dog; if it is a human, draw a human. NEVER change the species.`,
          `Preserve the character's distinctive features: fur/hair color, eye color, accessories, clothing, markings, and proportions from the reference image.`,
          '',
          sceneHint ? `SCENE/COSTUME CONTEXT: ${sceneHint}` : '',
          wasEdited
            ? `This illustration is for a LINE messaging sticker with the text "${caption}". Infer the most appropriate mood, facial expression, and body pose directly from this text. The character's expression and action must clearly convey the feeling of "${caption}".`
            : [
                `The character should express: ${actionStr} (mood: ${moodStr}).`,
                `This illustration is for a LINE messaging sticker with the text "${caption}".`,
                `The character pose and expression must clearly match the mood "${moodStr}" and convey the feeling of "${caption}".`,
              ].join('\n'),
          extraHint ? `\nADDITIONAL USER INSTRUCTION (highest priority for this specific sticker): ${extraHint}\n` : '',
          '', 'CRITICAL REQUIREMENTS:',
          '- PRESERVE the character species and visual identity from the reference image — this is the #1 priority',
          '- The character outfit/costume MUST match the scene context described above',
          '- Do NOT include any text, letters, words, numbers, or characters in the image',
          '- Use a clean solid CHROMA KEY GREEN background (hex #00B140) — this specific green is required for automated background removal. Fill the ENTIRE background with this exact green color.',
          '- FILL THE FRAME: The character should occupy at least 80-90% of the canvas height. Minimize empty space above and below the character. For upper-body shots, crop tightly from chest up. For full-body shots, the character should nearly touch the top and bottom edges.',
          '- Single character only, centered in frame',
          '- Expressive and clear at small sizes (370x320 pixels)',
          '- No decorative borders or frames',
        ].join('\n');
      };

      const generateOne = async (index, extraHint = '') => {
        const res = await fetch(`${WORKER_URL}/generate-image`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            prompt: buildPrompt(index, extraHint),
            referenceImage: referenceImage?.dataUrl || null,
            style: selectedStyle,
          }),
        });
        if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || `HTTP ${res.status}`);
        const data = await res.json();
        if (!data.images?.length) throw new Error('No image returned');
        const img = data.images[0];
        return `data:${img.mimeType};base64,${img.base64}`;
      };

      const handleGenerateAll = async () => {
        setIsGenerating(true);
        abortRef.current = false;
        setGenerateProgress({ current: 0, total: stickerCount, errors: [] });
        const nextImages = [...generatedImages];
        for (let i = 0; i < stickerCount; i++) {
          if (abortRef.current) break;
          setGenerateProgress(prev => ({ ...prev, current: i + 1 }));
          if (nextImages[i]) continue;
          try {
            nextImages[i] = await generateOne(i);
            setGeneratedImages([...nextImages]);
          } catch (err) {
            console.error(`Sticker ${i + 1} failed:`, err);
            setGenerateProgress(prev => ({ ...prev, errors: [...prev.errors, { index: i, message: err.message }] }));
          }
        }
        setIsGenerating(false);
      };

      const [regenLoadingIndex, setRegenLoadingIndex] = useState(null);

      const handleRetryOne = async (index) => {
        try {
          const hint = stickerHints[index] || '';
          const dataUrl = await generateOne(index, hint);
          const next = [...generatedImages]; next[index] = dataUrl; setGeneratedImages(next);
          const nextP = [...processedImages]; nextP[index] = null; setProcessedImages(nextP);
          setGenerateProgress(prev => ({ ...prev, errors: prev.errors.filter(e => e.index !== index) }));
        } catch (err) { alert(`第 ${index + 1} 張重試失敗：${err.message}`); }
      };

      // 單張重新生成（已有圖片也可用，帶自訂提示詞）
      const handleRegenOne = async (index) => {
        setRegenLoadingIndex(index);
        try {
          const hint = stickerHints[index] || '';
          const dataUrl = await generateOne(index, hint);
          const next = [...generatedImages]; next[index] = dataUrl; setGeneratedImages(next);
          const nextP = [...processedImages]; nextP[index] = null; setProcessedImages(nextP);
        } catch (err) { alert(`第 ${index + 1} 張重新生成失敗：${err.message}`); }
        finally { setRegenLoadingIndex(null); }
      };

      const completedCount = generatedImages.slice(0, stickerCount).filter(Boolean).length;
      const hasImages = completedCount > 0;

      return (
        <div className="space-y-6">
          <div className="text-center">
            <h2 className="text-xl font-bold text-gray-900 mb-1">預覽 & 生成</h2>
            <p className="text-gray-500 text-sm">畫風：{styleName} ・ {stickerCount} 張貼圖</p>
          </div>

          {/* === Generate Controls === */}
          <div className="text-center space-y-3">
            {!isGenerating ? (
              <button onClick={handleGenerateAll}
                className="px-8 py-3 rounded-xl bg-primary text-white font-bold text-lg
                           hover:bg-primary-dark transition shadow-lg shadow-primary/20">
                ✨ 一鍵生成 {stickerCount} 張
              </button>
            ) : (
              <div className="space-y-2">
                <button onClick={() => { abortRef.current = true; }}
                  className="px-6 py-2.5 rounded-xl bg-red-500 text-white font-medium hover:bg-red-600 transition">
                  ⏹ 停止生成
                </button>
                <div className="text-sm text-gray-500">正在生成第 {generateProgress.current}/{generateProgress.total} 張...</div>
              </div>
            )}
            {(isGenerating || hasImages) && (
              <div className="max-w-md mx-auto">
                <div className="h-2 bg-gray-200 rounded-full overflow-hidden">
                  <div className="h-full bg-primary rounded-full transition-all duration-300"
                    style={{ width: `${Math.round((completedCount / stickerCount) * 100)}%` }} />
                </div>
                <div className="flex justify-between text-xs text-gray-400 mt-1">
                  <span>{completedCount}/{stickerCount} 張完成</span>
                  {generateProgress.errors.length > 0 && (
                    <span className="text-red-400">{generateProgress.errors.length} 張失敗</span>
                  )}
                </div>
              </div>
            )}
            {!isGenerating && generateProgress.errors.length > 0 && (
              <div className="bg-red-50 border border-red-200 rounded-lg p-3 max-w-md mx-auto text-sm">
                <div className="text-red-700 font-medium mb-1">{generateProgress.errors.length} 張生成失敗</div>
                <div className="text-red-500 text-xs">
                  失敗：{generateProgress.errors.map(e => `#${e.index + 1}`).join('、')}
                </div>
                <div className="text-red-400 text-xs mt-1">可點擊失敗圖片上的重試按鈕</div>
              </div>
            )}
          </div>

          {/* === BG + Text Controls (visible after generation) === */}
          {hasImages && (
            <div className="space-y-3">
              {/* Background removal */}
              <div className="ctrl-section">
                <div className="flex flex-wrap items-center gap-4">
                  <div>
                    <span className="ctrl-label">去背方式</span>
                    <div className="flex gap-2">
                      <button onClick={async () => {
                          setBgMethod('smart');
                          const next = [];
                          for (let i = 0; i < stickerCount; i++) {
                            next[i] = generatedImages[i]
                              ? await removeBackgroundSmart(generatedImages[i], bgTolerance)
                              : null;
                          }
                          setProcessedImages(next);
                        }}
                        className={`px-3 py-1.5 rounded-lg text-xs font-medium transition ${
                          bgMethod === 'smart' ? 'bg-primary text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                        }`}>🎯 智慧去背</button>
                      <button onClick={() => { setBgMethod('ml'); handleMLRemoval(); }}
                        disabled={isProcessingBg}
                        className={`px-3 py-1.5 rounded-lg text-xs font-medium transition ${
                          bgMethod === 'ml' ? 'bg-primary text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                        } disabled:opacity-50`}>
                        {isProcessingBg ? '⏳ 載入中...' : '🤖 AI 去背'}
                      </button>
                      <button onClick={async () => {
                          setBgMethod('white');
                          const next = [];
                          for (let i = 0; i < stickerCount; i++) {
                            next[i] = generatedImages[i]
                              ? await removeWhiteBackground(generatedImages[i], bgTolerance)
                              : null;
                          }
                          setProcessedImages(next);
                        }}
                        className={`px-3 py-1.5 rounded-lg text-xs font-medium transition ${
                          bgMethod === 'white' ? 'bg-primary text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                        }`}>⚡ 快速去白</button>
                    </div>
                  </div>
                  {(bgMethod === 'white' || bgMethod === 'smart') && (
                    <div className="flex items-center gap-2">
                      <span className="ctrl-label whitespace-nowrap">容差</span>
                      <input type="range" min="5" max="80" value={bgTolerance}
                        onChange={(e) => handleToleranceChange(Number(e.target.value))} className="w-28" />
                      <span className="text-xs text-gray-500 w-8 text-right">{bgTolerance}</span>
                    </div>
                  )}
                  {isProcessingBg && (
                    <span className="text-xs text-amber-600 animate-pulse">
                      首次載入 AI 模型約需 30-60 秒（~80MB），後續使用有快取
                    </span>
                  )}
                </div>
              </div>

              {/* Text controls */}
              <TextControls textSettings={textSettings} setTextSettings={setTextSettings} applyLayout={applyLayout} />
            </div>
          )}

          {/* === Sticker Grid === */}
          <div className="sticker-grid">
            {Array.from({ length: stickerCount }).map((_, i) => {
              const isFailed = generateProgress.errors.find(e => e.index === i);
              const isCurrentlyGenerating = isGenerating && generateProgress.current === i + 1 && !generatedImages[i];
              const isRegening = regenLoadingIndex === i;
              const displayImage = processedImages[i] || generatedImages[i];

              return (
                <div key={i} className="flex flex-col">
                  <div
                    className={`sticker-slot ${displayImage ? 'has-image' : ''} ${
                      isFailed ? 'border-red-300 bg-red-50' : ''
                    } ${selectedSticker === i ? 'selected' : ''}`}
                    onClick={() => displayImage && setSelectedSticker(i)}>

                    {isRegening ? (
                      <div className="text-center p-2">
                        <div className="text-2xl mb-1 animate-pulse">⏳</div>
                        <div className="text-xs text-primary font-medium">重新生成中...</div>
                      </div>
                    ) : displayImage && fontsReady ? (
                      <StickerCanvas
                        imageDataUrl={displayImage}
                        caption={captions[i]}
                        textSettings={textSettings}
                        position={textPositions[i]}
                        onPositionChange={(pos) => updatePosition(i, pos)}
                      />
                    ) : isCurrentlyGenerating ? (
                      <div className="text-center p-2">
                        <div className="text-2xl mb-1 animate-pulse">⏳</div>
                        <div className="text-xs text-primary font-medium">生成中...</div>
                      </div>
                    ) : isFailed ? (
                      <div className="text-center p-2">
                        <div className="text-2xl text-red-300 mb-1">❌</div>
                        <button onClick={(e) => { e.stopPropagation(); handleRetryOne(i); }}
                          className="text-xs text-red-500 hover:text-red-700 underline">重試</button>
                      </div>
                    ) : (
                      <div className="text-center p-2">
                        <div className="text-2xl text-gray-300 mb-1">🖼️</div>
                        <div className="text-xs text-gray-400">{i + 1}</div>
                      </div>
                    )}
                  </div>
                  {/* 單張重生控制列 */}
                  {(displayImage || isFailed) && !isGenerating && (
                    <div className="mt-1 space-y-1">
                      <div className="flex gap-1">
                        <input
                          type="text"
                          value={stickerHints[i] || ''}
                          onChange={(e) => {
                            const next = [...stickerHints];
                            next[i] = e.target.value;
                            setStickerHints(next);
                          }}
                          placeholder="提示詞（如：手舉高）"
                          className="flex-1 text-xs px-2 py-1 border border-gray-200 rounded-lg focus:outline-none focus:border-primary min-w-0"
                          onClick={(e) => e.stopPropagation()}
                        />
                        <button
                          onClick={(e) => { e.stopPropagation(); handleRegenOne(i); }}
                          disabled={regenLoadingIndex !== null}
                          className="text-xs px-2 py-1 rounded-lg bg-primary text-white hover:bg-primary-dark transition whitespace-nowrap disabled:opacity-50"
                          title="重新生成這張">
                          🔄
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* === Summary === */}
          <div className="bg-white rounded-xl p-4 shadow-sm border border-gray-100 text-sm text-gray-600">
            <div className="grid grid-cols-2 gap-2">
              <div>📎 參考圖：{referenceImage?.file?.name || '無'}</div>
              <div>🎨 畫風：{styleName}</div>
              <div>📝 文案：{captions.slice(0, stickerCount).filter(c => c.trim()).length}/{stickerCount} 句已填</div>
              <div>📐 規格：{CANVAS_W}×{CANVAS_H}px（LINE 主圖）</div>
              <div>🔤 字體：{FONTS.find(f => f.family === textSettings.fontFamily)?.label || textSettings.fontFamily}</div>
              <div>🖌️ 去背：{bgMethod === 'smart' ? `智慧去背（容差 ${bgTolerance}）` : bgMethod === 'white' ? `快速去白（容差 ${bgTolerance}）` : 'AI 去背'}</div>
            </div>
          </div>

          {/* === P5: LINE Listing Text Generator === */}
          {hasImages && (
            <ListingGenerator
              captionTheme={captionTheme}
              captions={captions}
              stickerCount={stickerCount}
              listing={listing}
              setListing={setListing}
              isGeneratingListing={isGeneratingListing}
              setIsGeneratingListing={setIsGeneratingListing}
            />
          )}

          {/* === P4: Export Section === */}
          {hasImages && (
            <div className="bg-white rounded-xl p-5 shadow-sm border border-gray-100 space-y-4">
              <h3 className="text-base font-bold text-gray-900 flex items-center gap-2">
                📦 匯出 LINE 貼圖包
              </h3>
              <p className="text-xs text-gray-400">
                ZIP 包含：{stickerCount} 張主圖（01.png ~ {String(stickerCount).padStart(2, '0')}.png，370×320）+ main.png（240×240）+ tab.png（96×74），10px 安全邊距
              </p>

              {/* main / tab source selector */}
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                {/* Main Image Source */}
                <div>
                  <label className="ctrl-label mb-2 block">Main Image 來源（240×240 正方形）</label>
                  <div className="flex gap-2 flex-wrap">
                    {Array.from({ length: stickerCount }).map((_, i) => {
                      const hasSrc = processedImages[i] || generatedImages[i];
                      if (!hasSrc) return null;
                      return (
                        <button key={i} onClick={() => setMainSource(i)}
                          className={`w-10 h-10 rounded-lg text-xs font-bold transition flex items-center justify-center ${
                            mainSource === i
                              ? 'bg-primary text-white ring-2 ring-primary/40'
                              : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                          }`}>
                          {String(i + 1).padStart(2, '0')}
                        </button>
                      );
                    })}
                  </div>
                  {(processedImages[mainSource] || generatedImages[mainSource]) && (
                    <div className="mt-2 inline-block rounded-lg overflow-hidden border border-gray-200"
                      style={{ width: 80, height: 80, background: 'repeating-conic-gradient(#e8e8e8 0% 25%, #fff 0% 50%) 50% / 10px 10px' }}>
                      <img src={processedImages[mainSource] || generatedImages[mainSource]}
                        alt="main preview" className="w-full h-full object-cover" />
                    </div>
                  )}
                </div>

                {/* Tab Image Source */}
                <div>
                  <label className="ctrl-label mb-2 block">Tab Image 來源（96×74 寬扁）</label>
                  <div className="flex gap-2 flex-wrap">
                    {Array.from({ length: stickerCount }).map((_, i) => {
                      const hasSrc = processedImages[i] || generatedImages[i];
                      if (!hasSrc) return null;
                      return (
                        <button key={i} onClick={() => setTabSource(i)}
                          className={`w-10 h-10 rounded-lg text-xs font-bold transition flex items-center justify-center ${
                            tabSource === i
                              ? 'bg-primary text-white ring-2 ring-primary/40'
                              : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                          }`}>
                          {String(i + 1).padStart(2, '0')}
                        </button>
                      );
                    })}
                  </div>
                  {(processedImages[tabSource] || generatedImages[tabSource]) && (
                    <div className="mt-2 inline-block rounded-lg overflow-hidden border border-gray-200"
                      style={{ width: 96, height: 74, background: 'repeating-conic-gradient(#e8e8e8 0% 25%, #fff 0% 50%) 50% / 10px 10px' }}>
                      <img src={processedImages[tabSource] || generatedImages[tabSource]}
                        alt="tab preview" className="w-full h-full object-contain" />
                    </div>
                  )}
                </div>
              </div>

              {/* Export Button + Progress */}
              <div className="flex items-center gap-4">
                <button
                  onClick={async () => {
                    setIsExporting(true);
                    setExportProgress({ done: 0, total: stickerCount + 2, step: '準備中...' });
                    try {
                      const result = await buildStickerZip({
                        processedImages, generatedImages, captions, textSettings, textPositions,
                        stickerCount, mainSourceIndex: mainSource, tabSourceIndex: tabSource,
                        onProgress: (p) => setExportProgress(p),
                      });
                      setExportProgress({ done: result.fileCount, total: result.fileCount,
                        step: `完成！ZIP 大小 ${(result.zipSize / 1024).toFixed(0)} KB` });
                    } catch (err) {
                      console.error('Export failed:', err);
                      alert('匯出失敗：' + err.message);
                      setExportProgress(null);
                    } finally {
                      setIsExporting(false);
                    }
                  }}
                  disabled={isExporting || completedCount < stickerCount}
                  className="px-6 py-3 rounded-xl bg-primary text-white font-bold text-sm
                             hover:bg-primary-dark transition shadow-lg shadow-primary/20
                             disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-2">
                  {isExporting ? (
                    <><span className="animate-spin">⏳</span> 匯出中...</>
                  ) : (
                    <>📦 匯出 LINE 貼圖包</>
                  )}
                </button>

                {completedCount < stickerCount && !isExporting && (
                  <span className="text-xs text-amber-600">
                    需先完成全部 {stickerCount} 張生成（目前 {completedCount}/{stickerCount}）
                  </span>
                )}
              </div>

              {/* Export Progress Bar */}
              {exportProgress && (
                <div className="space-y-1">
                  <div className="h-2 bg-gray-200 rounded-full overflow-hidden">
                    <div className="h-full bg-primary rounded-full transition-all duration-300"
                      style={{ width: `${Math.round((exportProgress.done / exportProgress.total) * 100)}%` }} />
                  </div>
                  <div className="flex justify-between text-xs text-gray-400">
                    <span>{exportProgress.step}</span>
                    <span>{exportProgress.done}/{exportProgress.total}</span>
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ============================================================
    // ListingGenerator — LINE Creators Market 上架文案
    // ============================================================

    function ListingGenerator({ captionTheme, captions, stickerCount, listing, setListing, isGeneratingListing, setIsGeneratingListing }) {
      const [charDesc, setCharDesc] = useState('');

      const handleGenerate = async () => {
        setIsGeneratingListing(true);
        try {
          const themeLabel = captionTheme === 'custom' ? '自訂主題' :
            (CAPTION_THEMES.find(t => t.id === captionTheme)?.label || captionTheme);
          const res = await fetch(`${WORKER_URL}/generate-listing`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              theme: themeLabel,
              captions: captions.slice(0, stickerCount).filter(c => c.trim()),
              characterDescription: charDesc,
            }),
          });
          const data = await res.json();
          if (data.listing) {
            setListing(data.listing);
          } else {
            alert('上架文案生成失敗：' + (data.error || '未知錯誤'));
          }
        } catch (err) {
          console.error('Generate listing error:', err);
          alert('上架文案生成失敗：' + err.message);
        } finally {
          setIsGeneratingListing(false);
        }
      };

      const handleCopy = (text) => {
        navigator.clipboard.writeText(text).then(() => {
          // 簡易回饋
          const btn = document.activeElement;
          if (btn) { btn.textContent = '✓ 已複製'; setTimeout(() => { btn.textContent = '📋 複製'; }, 1500); }
        });
      };

      const updateField = (field, value) => {
        setListing(prev => ({ ...prev, [field]: value }));
      };

      return (
        <div className="bg-white rounded-xl p-5 shadow-sm border border-gray-100 space-y-4">
          <h3 className="text-base font-bold text-gray-900 flex items-center gap-2">
            📝 LINE 上架文案
            <span className="text-xs font-normal text-gray-400">Creators Market 標題＆說明＆版權（中英文）</span>
          </h3>

          {/* 角色描述（可選） + 生成按鈕 */}
          <div className="flex flex-wrap items-end gap-3">
            <div className="flex-1 min-w-48">
              <label className="text-xs text-gray-500 block mb-1">角色描述（可選，幫助 AI 寫出更精準的文案）</label>
              <input type="text" value={charDesc} onChange={(e) => setCharDesc(e.target.value)}
                placeholder="例如：奶油色小貓、柴犬、企鵝..."
                className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm
                           focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary" />
            </div>
            <button onClick={handleGenerate} disabled={isGeneratingListing}
              className="px-4 py-2 rounded-lg bg-primary text-white text-sm font-medium
                         disabled:opacity-50 hover:bg-primary-dark transition whitespace-nowrap">
              {isGeneratingListing ? '⏳ 生成中...' : '✨ 生成上架文案'}
            </button>
          </div>

          {/* 生成結果 */}
          {listing && (
            <div className="space-y-3">
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                {/* 中文標題 */}
                <div>
                  <div className="flex items-center justify-between mb-1">
                    <label className="text-xs text-gray-500">中文標題（max 40 字元）</label>
                    <button onClick={() => handleCopy(listing.title_zh)}
                      className="text-xs text-primary hover:text-primary-dark">📋 複製</button>
                  </div>
                  <input type="text" value={listing.title_zh || ''} onChange={(e) => updateField('title_zh', e.target.value)}
                    maxLength={40}
                    className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm font-medium
                               focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary" />
                  <span className="text-xs text-gray-300">{(listing.title_zh || '').length}/40</span>
                </div>

                {/* 英文標題 */}
                <div>
                  <div className="flex items-center justify-between mb-1">
                    <label className="text-xs text-gray-500">English Title (max 40 chars)</label>
                    <button onClick={() => handleCopy(listing.title_en)}
                      className="text-xs text-primary hover:text-primary-dark">📋 複製</button>
                  </div>
                  <input type="text" value={listing.title_en || ''} onChange={(e) => updateField('title_en', e.target.value)}
                    maxLength={40}
                    className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm font-medium
                               focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary" />
                  <span className="text-xs text-gray-300">{(listing.title_en || '').length}/40</span>
                </div>

                {/* 中文說明 */}
                <div>
                  <div className="flex items-center justify-between mb-1">
                    <label className="text-xs text-gray-500">中文貼圖說明（max 160 字元）</label>
                    <button onClick={() => handleCopy(listing.description_zh)}
                      className="text-xs text-primary hover:text-primary-dark">📋 複製</button>
                  </div>
                  <textarea value={listing.description_zh || ''} onChange={(e) => updateField('description_zh', e.target.value)}
                    maxLength={160} rows={2}
                    className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm
                               focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary resize-none" />
                  <span className="text-xs text-gray-300">{(listing.description_zh || '').length}/160</span>
                </div>

                {/* 英文說明 */}
                <div>
                  <div className="flex items-center justify-between mb-1">
                    <label className="text-xs text-gray-500">English Description (max 160 chars)</label>
                    <button onClick={() => handleCopy(listing.description_en)}
                      className="text-xs text-primary hover:text-primary-dark">📋 複製</button>
                  </div>
                  <textarea value={listing.description_en || ''} onChange={(e) => updateField('description_en', e.target.value)}
                    maxLength={160} rows={2}
                    className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm
                               focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary resize-none" />
                  <span className="text-xs text-gray-300">{(listing.description_en || '').length}/160</span>
                </div>
              </div>

              {/* 版權 */}
              <div>
                <div className="flex items-center justify-between mb-1">
                  <label className="text-xs text-gray-500">版權 Copyright（max 50 字元）</label>
                  <button onClick={() => handleCopy(listing.copyright)}
                    className="text-xs text-primary hover:text-primary-dark">📋 複製</button>
                </div>
                <input type="text" value={listing.copyright || ''} onChange={(e) => updateField('copyright', e.target.value)}
                  maxLength={50}
                  className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm
                             focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary" />
                <span className="text-xs text-gray-300">{(listing.copyright || '').length}/50</span>
              </div>

              {/* Tags */}
              {listing.tags?.length > 0 && (
                <div>
                  <div className="flex items-center justify-between mb-1">
                    <label className="text-xs text-gray-500">搜尋標籤 Tags</label>
                    <button onClick={() => handleCopy(listing.tags.join(', '))}
                      className="text-xs text-primary hover:text-primary-dark">📋 複製全部</button>
                  </div>
                  <div className="flex flex-wrap gap-1.5">
                    {listing.tags.map((tag, i) => (
                      <span key={i} className="px-2.5 py-1 bg-gray-100 text-gray-600 rounded-full text-xs">{tag}</span>
                    ))}
                  </div>
                </div>
              )}

              {/* 一鍵全部複製 */}
              <button onClick={() => {
                const all = [
                  `【中文標題】${listing.title_zh}`,
                  `【English Title】${listing.title_en}`,
                  `【中文說明】${listing.description_zh}`,
                  `【English Description】${listing.description_en}`,
                  `【版權】${listing.copyright || ''}`,
                  `【Tags】${(listing.tags || []).join(', ')}`,
                ].join('\n\n');
                navigator.clipboard.writeText(all);
                alert('已複製全部上架文案到剪貼簿！');
              }}
                className="w-full py-2 rounded-lg border border-primary text-primary text-sm font-medium
                           hover:bg-primary/5 transition">
                📋 一鍵複製全部上架文案
              </button>
            </div>
          )}
        </div>
      );
    }

    // ============================================================
    // StickerCanvas — Canvas-based sticker with draggable text
    // ============================================================

    function StickerCanvas({ imageDataUrl, caption, textSettings, position, onPositionChange }) {
      const canvasRef = useRef(null);
      const imgRef = useRef(null);
      const isDragging = useRef(false);
      const onPosRef = useRef(onPositionChange);
      onPosRef.current = onPositionChange;

      // Load image
      useEffect(() => {
        if (!imageDataUrl) { imgRef.current = null; draw(); return; }
        const img = new Image();
        img.onload = () => { imgRef.current = img; draw(); };
        img.src = imageDataUrl;
      }, [imageDataUrl]);

      // Redraw on text/position changes
      const sKey = `${textSettings.fontFamily}|${textSettings.fontSize}|${textSettings.fontColor}|${textSettings.strokeColor}|${textSettings.strokeWidth}`;
      useEffect(() => { draw(); }, [caption, sKey, position?.x, position?.y]);

      function draw() {
        const canvas = canvasRef.current;
        if (!canvas) return;
        drawStickerCanvas(canvas.getContext('2d'), imgRef.current, caption, textSettings, position);
      }

      // Coordinate helper
      function getPos(e) {
        const rect = canvasRef.current.getBoundingClientRect();
        const cx = (e.touches ? e.touches[0].clientX : e.clientX);
        const cy = (e.touches ? e.touches[0].clientY : e.clientY);
        return {
          x: Math.max(0.05, Math.min(0.95, ((cx - rect.left) / rect.width))),
          y: Math.max(0.05, Math.min(0.95, ((cy - rect.top) / rect.height))),
        };
      }

      function handleDown(e) {
        if (!caption) return;
        e.preventDefault();
        isDragging.current = true;
        onPosRef.current?.(getPos(e));
      }

      function handleMove(e) {
        if (!isDragging.current) return;
        e.preventDefault();
        onPosRef.current?.(getPos(e));
      }

      function handleUp() { isDragging.current = false; }

      // Document-level listeners for drag outside canvas
      useEffect(() => {
        const move = (e) => {
          if (!isDragging.current) return;
          const rect = canvasRef.current?.getBoundingClientRect();
          if (!rect) return;
          const cx = (e.touches ? e.touches[0].clientX : e.clientX);
          const cy = (e.touches ? e.touches[0].clientY : e.clientY);
          onPosRef.current?.({
            x: Math.max(0.05, Math.min(0.95, (cx - rect.left) / rect.width)),
            y: Math.max(0.05, Math.min(0.95, (cy - rect.top) / rect.height)),
          });
        };
        const up = () => { isDragging.current = false; };
        document.addEventListener('mousemove', move);
        document.addEventListener('mouseup', up);
        document.addEventListener('touchmove', move, { passive: false });
        document.addEventListener('touchend', up);
        return () => {
          document.removeEventListener('mousemove', move);
          document.removeEventListener('mouseup', up);
          document.removeEventListener('touchmove', move);
          document.removeEventListener('touchend', up);
        };
      }, []);

      return (
        <div className="canvas-wrap">
          <canvas ref={canvasRef} width={CANVAS_W} height={CANVAS_H}
            onMouseDown={handleDown} onTouchStart={handleDown} />
        </div>
      );
    }

    // ============================================================
    // TextControls — Font, size, color, stroke, layout
    // ============================================================

    function TextControls({ textSettings, setTextSettings, applyLayout }) {
      const update = (key, val) => setTextSettings(prev => ({ ...prev, [key]: val }));

      return (
        <div className="ctrl-section">
          <div className="flex flex-wrap items-end gap-x-5 gap-y-3">
            {/* Font */}
            <div>
              <span className="ctrl-label">字體</span>
              <select value={textSettings.fontFamily}
                onChange={(e) => update('fontFamily', e.target.value)}
                className="border border-gray-200 rounded-lg px-3 py-2 text-sm">
                {FONTS.map(f => (
                  <option key={f.id} value={f.family}>{f.label}</option>
                ))}
              </select>
            </div>

            {/* Size */}
            <div>
              <span className="ctrl-label">大小 {textSettings.fontSize}px</span>
              <input type="range" min="16" max="64" value={textSettings.fontSize}
                onChange={(e) => update('fontSize', Number(e.target.value))} className="w-24" />
            </div>

            {/* Font Color */}
            <div>
              <span className="ctrl-label">文字色</span>
              <input type="color" value={textSettings.fontColor}
                onChange={(e) => update('fontColor', e.target.value)} />
            </div>

            {/* Stroke Color */}
            <div>
              <span className="ctrl-label">描邊色</span>
              <input type="color" value={textSettings.strokeColor}
                onChange={(e) => update('strokeColor', e.target.value)} />
            </div>

            {/* Stroke Width */}
            <div>
              <span className="ctrl-label">描邊 {textSettings.strokeWidth}px</span>
              <input type="range" min="0" max="12" value={textSettings.strokeWidth}
                onChange={(e) => update('strokeWidth', Number(e.target.value))} className="w-20" />
            </div>

            {/* Layout Presets */}
            <div>
              <span className="ctrl-label">排版（全部套用）</span>
              <div className="flex gap-1.5">
                {LAYOUT_PRESETS.map(l => (
                  <button key={l.id} onClick={() => applyLayout(l.pos)}
                    title={l.label}
                    className="w-8 h-8 rounded-lg bg-gray-100 hover:bg-gray-200 transition
                               flex items-center justify-center text-sm">
                    {l.icon}
                  </button>
                ))}
              </div>
            </div>
          </div>

          {/* Font Preview */}
          <div className="mt-3 flex gap-2 flex-wrap">
            {FONTS.map(f => (
              <span key={f.id}
                onClick={() => update('fontFamily', f.family)}
                className={`px-3 py-1 rounded-full text-sm cursor-pointer transition ${
                  textSettings.fontFamily === f.family
                    ? 'bg-primary/10 text-primary ring-1 ring-primary/30'
                    : 'bg-gray-50 text-gray-500 hover:bg-gray-100'
                }`}
                style={{ fontFamily: `"${f.family}", "Noto Sans TC", sans-serif` }}>
                {f.label} 永不放棄
              </span>
            ))}
          </div>

          <div className="text-xs text-gray-400 mt-2">
            💡 拖曳貼圖上的文字可調整個別位置 ・ 排版按鈕會套用到所有貼圖
          </div>
        </div>
      );
    }

    // ============================================================
    // Mount
    // ============================================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
