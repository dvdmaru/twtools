const PROXY_URL = 'https://tripcraft-proxy.charlie-chien.workers.dev'; // ← 部署後替換

function getDeviceId() {
  let id = localStorage.getItem('tc_device_id');
  if (!id) {
    id = 'dev-' + crypto.randomUUID();
    localStorage.setItem('tc_device_id', id);
  }
  return id;
}

async function callTripAPI({ prompt, userApiKey, mode = 'generate' }) {
  const deviceId = getDeviceId();
  const res = await fetch(PROXY_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt, deviceId, userApiKey: userApiKey || undefined, mode }),
  });
  const data = await res.json();
  if (!res.ok) throw { status: res.status, ...data };
  return data;
}

// Fallback: 直接呼叫 Anthropic（開發模式或 proxy 未部署時）
async function callClaudeDirect(apiKey, prompt) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 8000,
      messages: [{ role: 'user', content: prompt }],
    }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error?.message || `API error (${res.status})`);
  }
  return await res.json();
}

// ── Map ──
function TripMap({ days, selectedDay }) {
  const mapRef = useRef(null);
  const mapInstance = useRef(null);
  const markersRef = useRef([]);
  useEffect(() => {
    if (!mapRef.current||mapInstance.current) return;
    mapInstance.current = L.map(mapRef.current,{zoomControl:false}).setView([35.68,139.76],12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(mapInstance.current);
    L.control.zoom({position:'topright'}).addTo(mapInstance.current);
  }, []);
  useEffect(() => {
    if (!mapInstance.current||!days?.length) return;
    markersRef.current.forEach(m => m.remove()); markersRef.current = [];
    const bounds = [];
    const dayData = selectedDay!==null ? [days[selectedDay]] : days;
    dayData.forEach(day => {
      (day.activities||[]).forEach((act, ai) => {
        if (!act.location?.lat||!act.location?.lng) return;
        const pos = [act.location.lat, act.location.lng]; bounds.push(pos);
        const color = CATEGORY_COLORS[act.category]||'#6366f1';
        const icon = L.divIcon({ className:'', html:`<div style="background:${color};color:white;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3)">${selectedDay!==null?ai+1:''}</div>`, iconSize:[28,28], iconAnchor:[14,14] });
        const m = L.marker(pos,{icon}).addTo(mapInstance.current).bindPopup(`<b>${CATEGORY_ICONS[act.category]||''} ${act.name}</b><br>${act.time}${act.endTime?' - '+act.endTime:''}<br><small>${act.description||''}</small>`);
        markersRef.current.push(m);
      });
    });
    if (bounds.length > 0) mapInstance.current.fitBounds(bounds, { padding:[40,40], maxZoom:15 });
  }, [days, selectedDay]);
  return <div ref={mapRef} style={{width:'100%',height:'100%',minHeight:300}} />;
}

// ── Budget Chart ──
function BudgetChart({ totalBudget, currency }) {
  const t = useT();
  const canvasRef = useRef(null); const chartRef = useRef(null);
  const sym = CURRENCY_SYMBOLS[currency]||'';
  useEffect(() => {
    if (!canvasRef.current||!totalBudget) return;
    if (chartRef.current) chartRef.current.destroy();
    const labels = [t.food,t.transport,t.activities,t.accommodation,t.misc];
    const values = [totalBudget.food,totalBudget.transport,totalBudget.activities,totalBudget.accommodation,totalBudget.miscellaneous||0];
    const colors = ['#f97316','#64748b','#6366f1','#06b6d4','#a3a3a3'];
    chartRef.current = new Chart(canvasRef.current, { type:'doughnut', data:{labels,datasets:[{data:values,backgroundColor:colors,borderWidth:0,hoverOffset:8}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${sym}${ctx.parsed.toLocaleString()}`}}}}
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [totalBudget,currency]);
  if (!totalBudget) return null;
  const items = [[t.food,totalBudget.food,'#f97316','🍜'],[t.transport,totalBudget.transport,'#64748b','🚆'],[t.activities,totalBudget.activities,'#6366f1','🎫'],[t.accommodation,totalBudget.accommodation,'#06b6d4','🏨'],[t.misc,totalBudget.miscellaneous||0,'#a3a3a3','📦']];
  return (
    <div>
      <div className="relative" style={{height:200}}><canvas ref={canvasRef}/><div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none"><span className="text-xs text-gray-400">{t.totalLabel}</span><span className="text-lg font-bold text-gray-800">{sym}{(totalBudget.total||0).toLocaleString()}</span></div></div>
      <div className="mt-4 space-y-2">{items.filter(i=>i[1]>0).map(([label,val,color,icon]) => (
        <div key={label} className="flex items-center justify-between text-sm"><div className="flex items-center gap-2"><span className="w-3 h-3 rounded-full" style={{background:color}}/><span className="text-gray-600">{icon} {label}</span></div><span className="font-medium text-gray-700">{sym}{val.toLocaleString()}</span></div>
      ))}</div>
    </div>
  );
}

// ── Google Calendar URL ──
function makeGCalUrl(act, date) {
  const d = date.replace(/-/g, '');
  const t1 = (act.time||'09:00').replace(':','') + '00';
  const t2 = (act.endTime||'10:00').replace(':','') + '00';
  const params = new URLSearchParams({
    action: 'TEMPLATE',
    text: act.name,
    dates: `${d}T${t1}/${d}T${t2}`,
    details: act.description || '',
    location: act.location?.address || '',
  });
  return `https://calendar.google.com/calendar/render?${params}`;
}

// ── Results ──
function ResultsView({ trip, tripData, onReset, lang, apiKey, onUpdateTrip }) {
  const t = useT();
  const [selectedDay, setSelectedDay] = useState(0);
  const [activeTab, setActiveTab] = useState('itinerary');
  const [replanOpen, setReplanOpen] = useState(false);
  const [replanNote, setReplanNote] = useState('');
  const [replanning, setReplanning] = useState(false);
  const [replanMsg, setReplanMsg] = useState(null);
  const sym = CURRENCY_SYMBOLS[tripData.currency]||'';
  const days = trip.days||[];

  const handleReplanDay = async () => {
    if (replanning) return;
    setReplanning(true); setReplanMsg(null);
    try {
      const dayData = days[selectedDay];
      const prompt = buildModifyPrompt(dayData, tripData, replanNote, lang);
      const userKey = apiKey?.trim();
      let resultText;

      try {
        const proxyResult = await callTripAPI({ prompt, userApiKey: userKey || undefined, mode: 'modify' });
        resultText = proxyResult.content[0].text;
      } catch (proxyErr) {
        if (userKey && userKey.startsWith('sk-ant-')) {
          const directResult = await callClaudeDirect(userKey, prompt);
          resultText = directResult.content[0].text;
        } else {
          throw new Error(proxyErr.message || proxyErr.error || 'Service unavailable');
        }
      }

      const jsonMatch = resultText.match(/\{[\s\S]*\}/);
      if (!jsonMatch) throw new Error('Unable to parse AI response');
      const newDay = JSON.parse(jsonMatch[0]);

      // 更新行程
      const newDays = [...days];
      newDays[selectedDay] = newDay;
      const newTrip = { ...trip, days: newDays };
      // 重算 totalBudget
      const totals = { food:0, transport:0, activities:0, accommodation:0, miscellaneous: trip.totalBudget?.miscellaneous || 0 };
      newDays.forEach(d => {
        if (d.dailyCost) { totals.food += d.dailyCost.food||0; totals.transport += d.dailyCost.transport||0; totals.activities += d.dailyCost.activities||0; totals.accommodation += d.dailyCost.accommodation||0; }
      });
      totals.total = totals.food + totals.transport + totals.activities + totals.accommodation + totals.miscellaneous;
      newTrip.totalBudget = totals;

      onUpdateTrip(newTrip);
      setReplanOpen(false); setReplanNote('');
      setReplanMsg('success');
      setTimeout(() => setReplanMsg(null), 2000);
    } catch (e) {
      setReplanMsg(e.message);
    } finally {
      setReplanning(false);
    }
  };

  const exportICS = () => {
    let ics = 'BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//TripCraft//TWTools//\n';
    days.forEach(day => { (day.activities||[]).forEach(act => {
      const dt = day.date.replace(/-/g,'');
      const t1 = (act.time||'09:00').replace(':','')+'00';
      const t2 = (act.endTime||'10:00').replace(':','')+'00';
      ics += `BEGIN:VEVENT\nDTSTART:${dt}T${t1}\nDTEND:${dt}T${t2}\nSUMMARY:${act.name}\nDESCRIPTION:${act.description||''}\nLOCATION:${act.location?.address||''}\nEND:VEVENT\n`;
    }); });
    ics += 'END:VCALENDAR';
    const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([ics],{type:'text/calendar'})); a.download = `${trip.tripTitle||'trip'}.ics`; a.click();
  };
  const exportJSON = () => {
    const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(trip,null,2)],{type:'application/json'})); a.download = `${trip.tripTitle||'trip'}.json`; a.click();
  };

  return (
    <div className="min-h-screen bg-gray-50">
      <div className="bg-gradient-to-r from-brand-600 to-brand-800 text-white">
        <div className="max-w-6xl mx-auto px-4 py-6">
          <div className="flex items-center justify-between mb-4"><Logo white /><div className="flex items-center gap-2">
            <button onClick={onReset} className="px-4 py-2 bg-white/20 hover:bg-white/30 rounded-lg text-sm font-medium backdrop-blur transition-all">{t.resetBtn}</button>
          </div></div>
          <h1 className="text-2xl sm:text-3xl font-bold mb-1">{trip.tripTitle||'My Trip'}</h1>
          <p className="text-brand-100 text-sm">{trip.summary}</p>
          <div className="flex flex-wrap gap-4 mt-4 text-sm text-brand-100">
            <span>📅 {tripData.startDate} ～ {tripData.endDate}</span><span>💰 {sym}{Number(tripData.budget).toLocaleString()} {tripData.currency}</span><span>👥 {tripData.travelers}{t.person}</span>
          </div>
        </div>
      </div>
      {trip.tips?.length > 0 && (
        <div className="max-w-6xl mx-auto px-4 -mt-3"><div className="bg-amber-50 border border-amber-200 rounded-xl p-4">
          <p className="font-semibold text-amber-800 text-sm mb-2">{t.tipsTitle}</p>
          <ul className="space-y-1">{trip.tips.map((tip,i) => <li key={i} className="text-sm text-amber-700">• {tip}</li>)}</ul>
        </div></div>
      )}
      <div className="max-w-6xl mx-auto px-4 mt-4">
        <div className="flex gap-1 bg-white rounded-xl p-1 border border-gray-200 mb-4 w-fit">
          {[['itinerary',t.tabItinerary],['map',t.tabMap],['budget',t.tabBudget]].map(([key,label]) => (
            <button key={key} onClick={() => setActiveTab(key)} className={`px-4 py-2 rounded-lg text-sm font-medium transition-all ${activeTab===key?'bg-brand-500 text-white shadow-sm':'text-gray-600 hover:bg-gray-100'}`}>{label}</button>
          ))}
        </div>
      </div>
      <div className="max-w-6xl mx-auto px-4 pb-20">
        {activeTab==='itinerary' && (
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 slide-up">
            <div className="lg:col-span-1"><div className="bg-white rounded-2xl border border-gray-200 p-4 sticky top-4">
              <h3 className="font-semibold text-gray-800 mb-3">{t.daysSection}</h3>
              <div className="space-y-2 max-h-[50vh] overflow-y-auto custom-scrollbar">
                {days.map((day,i) => (
                  <button key={i} onClick={() => setSelectedDay(i)} className={`w-full text-left p-3 rounded-xl transition-all ${selectedDay===i?'bg-brand-50 border-brand-300 border-2':'bg-gray-50 border border-transparent hover:bg-gray-100'}`}>
                    <div className="flex items-center justify-between"><span className={`text-xs font-bold px-2 py-0.5 rounded-full ${selectedDay===i?'bg-brand-500 text-white':'bg-gray-200 text-gray-600'}`}>{t.dayLabel(i+1)}</span><span className="text-xs text-gray-400">{day.date}</span></div>
                    <p className="text-sm font-medium text-gray-700 mt-1.5 truncate">{day.dayTitle}</p>
                    {day.dailyCost && <p className="text-xs text-gray-400 mt-1">{sym}{Object.values(day.dailyCost).reduce((a,b)=>a+(b||0),0).toLocaleString()}</p>}
                  </button>
                ))}
              </div>
              <div className="mt-4 pt-4 border-t border-gray-100 space-y-2">
                <button onClick={exportICS} className="w-full py-2.5 rounded-xl border border-gray-200 text-sm font-medium text-gray-600 hover:bg-gray-50 flex items-center justify-center gap-2">{t.exportICS}</button>
                <button onClick={exportJSON} className="w-full py-2.5 rounded-xl border border-gray-200 text-sm font-medium text-gray-600 hover:bg-gray-50 flex items-center justify-center gap-2">{t.exportJSON}</button>
              </div>
            </div></div>
            <div className="lg:col-span-2">{days[selectedDay] && (
              <div className="fade-in">
                <div className="flex items-center gap-3 mb-4"><span className="px-3 py-1 bg-brand-500 text-white rounded-full text-sm font-bold">{t.dayLabel(selectedDay+1)}</span><h3 className="text-xl font-bold text-gray-800">{days[selectedDay].dayTitle}</h3></div>
                <div className="space-y-3">
                  {(days[selectedDay].activities||[]).map((act,i) => {
                    const color = CATEGORY_COLORS[act.category]||'#6366f1';
                    return (
                      <div key={i} className="activity-card flex gap-3 p-3 bg-white rounded-xl border border-gray-100 hover:border-gray-200">
                        <div className="flex flex-col items-center min-w-[50px]"><span className="text-xs font-medium text-gray-500">{act.time}</span>{act.endTime&&<span className="text-[10px] text-gray-400">{act.endTime}</span>}</div>
                        <div className="w-0.5 rounded-full" style={{background:color,minHeight:40}}/>
                        <div className="flex-1 min-w-0">
                          <div className="flex items-center gap-2 mb-0.5"><span className="text-base">{CATEGORY_ICONS[act.category]||'📍'}</span><span className="font-semibold text-gray-800 text-sm truncate">{act.name}</span>{act.nameEn&&<span className="text-xs text-gray-400 truncate hidden sm:inline">{act.nameEn}</span>}</div>
                          {act.description&&<p className="text-xs text-gray-500 mb-1">{act.description}</p>}
                          <div className="flex items-center gap-3 text-xs text-gray-400">
                            {act.cost>0&&<span className="text-accent-600 font-medium">{act.costNote||`${sym}${act.cost}`}</span>}
                            {act.location?.address&&<span className="truncate">📍 {act.location.address}</span>}
                            <a href={makeGCalUrl(act, days[selectedDay].date)} target="_blank" rel="noopener"
                              className="text-brand-600 hover:underline ml-auto shrink-0">{t.addToGCal}</a>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
                {days[selectedDay].accommodation&&(
                  <div className="mt-4 p-4 bg-cyan-50 rounded-xl border border-cyan-200">
                    <div className="flex items-center gap-2 mb-1"><span className="text-lg">🏨</span><span className="font-semibold text-gray-800">{days[selectedDay].accommodation.name}</span></div>
                    {days[selectedDay].accommodation.cost>0&&<span className="text-sm text-cyan-700">{sym}{days[selectedDay].accommodation.cost.toLocaleString()} {t.perNight}</span>}
                  </div>
                )}
                {days[selectedDay].dailyCost&&(
                  <div className="mt-4 p-4 bg-gray-50 rounded-xl grid grid-cols-4 gap-3 text-center">
                    {[['🍜',t.food,'food'],['🚆',t.transport,'transport'],['🎫',t.activities,'activities'],['🏨',t.accommodation,'accommodation']].map(([icon,label,key]) => (
                      <div key={key}><div className="text-lg">{icon}</div><div className="text-xs text-gray-400">{label}</div><div className="text-sm font-semibold text-gray-700">{sym}{(days[selectedDay].dailyCost[key]||0).toLocaleString()}</div></div>
                    ))}
                  </div>
                )}

                {/* 重新規劃這天 */}
                <div className="mt-4">
                  {replanMsg === 'success' && <div className="mb-3 px-4 py-2 bg-green-50 text-green-700 rounded-lg text-sm font-medium fade-in">{t.replanSuccess}</div>}
                  {replanMsg && replanMsg !== 'success' && <div className="mb-3 px-4 py-2 bg-red-50 text-red-700 rounded-lg text-sm fade-in">{replanMsg}</div>}
                  {!replanOpen ? (
                    <button onClick={() => setReplanOpen(true)}
                      className="w-full py-2.5 rounded-xl border border-dashed border-brand-300 text-brand-600 text-sm font-medium hover:bg-brand-50 transition-all flex items-center justify-center gap-2">
                      {t.replanDay} <span className="text-xs text-gray-400">⚡ Haiku</span>
                    </button>
                  ) : (
                    <div className="p-4 bg-brand-50 rounded-xl border border-brand-200 fade-in">
                      <p className="text-sm font-medium text-brand-700 mb-2">{t.replanDayDesc}</p>
                      <textarea value={replanNote} onChange={e => setReplanNote(e.target.value)} placeholder={t.replanDayPlaceholder}
                        className="w-full px-3 py-2 rounded-lg border border-brand-200 bg-white text-sm h-20 resize-none mb-3" />
                      <div className="flex gap-2">
                        <button onClick={() => { setReplanOpen(false); setReplanNote(''); }}
                          className="px-4 py-2 rounded-lg border border-gray-300 text-gray-600 text-sm hover:bg-white">{t.replanDayCancel}</button>
                        <button onClick={handleReplanDay} disabled={replanning}
                          className="flex-1 py-2 rounded-lg bg-brand-500 text-white text-sm font-medium hover:bg-brand-600 disabled:opacity-50 flex items-center justify-center gap-2">
                          {replanning ? <><span className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"/>{t.replanning}</> : t.replanDayBtn}
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            )}</div>
          </div>
        )}
        {activeTab==='map' && (
          <div className="slide-up"><div className="bg-white rounded-2xl border border-gray-200 overflow-hidden" style={{height:500}}>
            <div className="flex items-center gap-2 px-4 py-3 border-b border-gray-100 flex-wrap">
              <button onClick={() => setSelectedDay(null)} className={`px-3 py-1 rounded-full text-xs font-medium ${selectedDay===null?'bg-brand-500 text-white':'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>{t.showAll}</button>
              {days.map((_,i) => <button key={i} onClick={() => setSelectedDay(i)} className={`px-3 py-1 rounded-full text-xs font-medium ${selectedDay===i?'bg-brand-500 text-white':'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>{t.dayLabel(i+1)}</button>)}
            </div>
            <TripMap days={days} selectedDay={selectedDay}/>
          </div></div>
        )}
        {activeTab==='budget' && (
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6 slide-up">
            <div className="bg-white rounded-2xl border border-gray-200 p-6"><h3 className="font-bold text-gray-800 mb-4">{t.budgetDist}</h3><BudgetChart totalBudget={trip.totalBudget} currency={tripData.currency}/></div>
            <div className="bg-white rounded-2xl border border-gray-200 p-6">
              <h3 className="font-bold text-gray-800 mb-4">{t.dailyCost}</h3>
              <div className="space-y-3 max-h-[400px] overflow-y-auto custom-scrollbar">
                {days.map((day,i) => {
                  const total = day.dailyCost?Object.values(day.dailyCost).reduce((a,b)=>a+(b||0),0):0;
                  const maxD = Math.max(...days.map(d=>d.dailyCost?Object.values(d.dailyCost).reduce((a,b)=>a+(b||0),0):0));
                  return (<div key={i} className="p-3 bg-gray-50 rounded-xl"><div className="flex items-center justify-between mb-2"><span className="text-sm font-medium text-gray-700">{t.dayLabel(i+1)} - {day.dayTitle}</span><span className="text-sm font-bold text-gray-800">{sym}{total.toLocaleString()}</span></div>
                    <div className="w-full bg-gray-200 rounded-full h-2"><div className="bg-gradient-to-r from-brand-400 to-brand-600 h-2 rounded-full" style={{width:`${maxD>0?(total/maxD*100):0}%`}}/></div></div>);
                })}
              </div>
              {trip.totalBudget && (
                <div className="mt-4 pt-4 border-t border-gray-100">
                  <div className="flex justify-between items-center"><span className="font-semibold text-gray-700">{t.estimatedTotal}</span><span className="text-xl font-bold text-brand-600">{sym}{(trip.totalBudget.total||0).toLocaleString()}</span></div>
                  <div className="flex justify-between items-center mt-1"><span className="text-sm text-gray-400">{t.setBudget}</span><span className="text-sm text-gray-500">{sym}{Number(tripData.budget).toLocaleString()}</span></div>
                  {trip.totalBudget.total>Number(tripData.budget) ?
                    <p className="mt-2 text-sm text-red-500 font-medium">{t.overBudget(`${sym}${(trip.totalBudget.total-Number(tripData.budget)).toLocaleString()}`)}</p> :
                    <p className="mt-2 text-sm text-green-600 font-medium">{t.underBudget(`${sym}${(Number(tripData.budget)-trip.totalBudget.total).toLocaleString()}`)}</p>
                  }
                </div>
              )}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════
// Main App
// ═══════════════════════════════════════════
function App() {
  const [lang, setLang] = useState(() => {
    const saved = localStorage.getItem('tc_lang');
    if (saved && T[saved]) return saved;
    const bl = navigator.language || '';
    if (bl.startsWith('zh-CN') || bl === 'zh') return 'zh-CN';
    if (bl.startsWith('zh')) return 'zh-TW';
    if (bl.startsWith('en')) return 'en';
    return 'zh-TW';
  });
  const [step, setStep] = useState(0);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [trip, setTrip] = useState(null);
  const [apiKey, setApiKey] = useState('');
  const [quota, setQuota] = useState(null);
  const [formData, setFormData] = useState({
    destination:'', startDate:'', endDate:'', budget:'',
    currency:'JPY', travelers:2, style:'moderate', pace:'moderate',
    interests:['food','sightseeing'], notes:''
  });

  const t = T[lang];
  useEffect(() => { localStorage.setItem('tc_lang', lang); document.documentElement.lang = lang; }, [lang]);

  const updateForm = useCallback(patch => setFormData(prev => ({...prev,...patch})), []);
  const numDays = useMemo(() => {
    if (!formData.startDate||!formData.endDate) return 0;
    return Math.max(1, Math.ceil((new Date(formData.endDate)-new Date(formData.startDate))/86400000)+1);
  }, [formData.startDate, formData.endDate]);

  const handleGenerate = async () => {
    setLoading(true); setError(null);
    try {
      const interestLabels = (formData.interests||[]).map(id => t['interest_'+id] || id);
      const prompt = buildPrompt({...formData, numDays, interests: interestLabels}, lang);
      let resultText;
      const userKey = apiKey.trim();

      try {
        // 嘗試走 proxy
        const proxyResult = await callTripAPI({ prompt, userApiKey: userKey || undefined });
        resultText = proxyResult.content[0].text;
        if (proxyResult.quota) setQuota(proxyResult.quota);
      } catch (proxyErr) {
        if (proxyErr.error === 'free_limit_reached') {
          setQuota({ used: proxyErr.used, limit: proxyErr.limit, remaining: 0 });
          throw new Error(proxyErr.message);
        }
        // Proxy 不可用，fallback 直呼 Anthropic（需要 user key）
        if (userKey && userKey.startsWith('sk-ant-')) {
          const directResult = await callClaudeDirect(userKey, prompt);
          resultText = directResult.content[0].text;
        } else {
          throw new Error(proxyErr.message || proxyErr.error || 'Service unavailable');
        }
      }

      const jsonMatch = resultText.match(/\{[\s\S]*\}/);
      if (!jsonMatch) throw new Error('Unable to parse AI response');
      setTrip(JSON.parse(jsonMatch[0]));
    } catch (e) {
      setError(e.message);
      setLoading(false);
    }
  };

  const handleReset = () => { setTrip(null); setStep(0); setLoading(false); setError(null); };

  if (trip) return (
    <I18nContext.Provider value={t}>
      <ResultsView trip={trip} tripData={formData} onReset={handleReset} lang={lang} apiKey={apiKey} onUpdateTrip={setTrip} />
    </I18nContext.Provider>
  );

  return (
    <I18nContext.Provider value={t}>
      <div className="min-h-screen bg-gradient-to-br from-brand-50 via-white to-accent-50">
        <div className="max-w-xl mx-auto px-4 py-8">
          <div className="flex justify-between items-start mb-6">
            <BackToTWTools />
            <LangSwitcher lang={lang} setLang={setLang} />
          </div>
          <div className="text-center mb-8">
            <div className="flex justify-center mb-3"><Logo /></div>
            <h1 className="text-3xl font-bold text-gray-800">{t.appTitle}</h1>
            <p className="text-gray-500 mt-1">{t.appSubtitle}</p>
          </div>
          {loading ? <LoadingScreen /> : (
            <>
              <StepIndicator current={step} total={4} />
              {error && (
                <div className="mb-4 p-4 bg-red-50 border border-red-200 rounded-xl text-red-700 text-sm">
                  <p className="font-semibold mb-1">{t.errorTitle}</p><p>{error}</p>
                  <button onClick={() => {setError(null);setLoading(false);}} className="mt-2 text-red-600 underline text-xs">{t.close}</button>
                </div>
              )}
              {step===0 && <StepDestination data={formData} onChange={updateForm} onNext={() => setStep(1)} lang={lang} />}
              {step===1 && <StepDatesAndBudget data={formData} onChange={updateForm} onNext={() => setStep(2)} onBack={() => setStep(0)} />}
              {step===2 && <StepPreferences data={formData} onChange={updateForm} onNext={() => setStep(3)} onBack={() => setStep(1)} />}
              {step===3 && <StepReview data={formData} onBack={() => setStep(2)} onGenerate={handleGenerate} apiKey={apiKey} setApiKey={setApiKey} quota={quota} />}
            </>
          )}
          <p className="text-center text-xs text-gray-400 mt-12">{t.poweredBy}</p>
        </div>
      </div>
    </I18nContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
