function detectCurrencyFromDestination(text) {
  if (!text || text.trim().length < 2) return null;
  const lower = text.toLowerCase().trim();
  let bestMatch = null;
  let bestLen = 0;
  for (const entry of DEST_CURRENCY_MAP) {
    for (const kw of entry.keywords) {
      if (lower.includes(kw.toLowerCase()) && kw.length > bestLen) {
        bestMatch = entry.currency;
        bestLen = kw.length;
      }
    }
  }
  return bestMatch;
}

function getDeviceId() {
  let id = localStorage.getItem('tc_device_id');
  if (!id) {
    id = 'dev-' + crypto.randomUUID();
    localStorage.setItem('tc_device_id', id);
  }
  return id;
}

async function callTripAPI({ prompt, userApiKey, mode = 'generate' }) {
  const deviceId = getDeviceId();
  const res = await fetch(PROXY_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt, deviceId, userApiKey: userApiKey || undefined, mode }),
  });
  const data = await res.json();
  if (!res.ok) throw { status: res.status, ...data };
  return data;
}

      'anthropic-version': '2023-06-01',

    body: JSON.stringify({

// ═══════════════════════════════════════════
// JSON Repair (處理被截斷的 AI 回應)
// ═══════════════════════════════════════════
function repairJSON(text) {
  // 先嘗試直接解析
  try { return JSON.parse(text); } catch(e) {}

  // 提取 JSON 部分
  let json = text.match(/\{[\s\S]*/)?.[0];
  if (!json) throw new Error('No JSON found in response');

  // 嘗試直接解析提取的部分
  try { return JSON.parse(json); } catch(e) {}

  // 修復被截斷的 JSON：補齊缺少的括號
  // 移除最後一個不完整的屬性（可能在字串中間截斷）
  json = json.replace(/,\s*"[^"]*"?\s*:?\s*[^,\}\]]*$/, '');
  json = json.replace(/,\s*\{[^}]*$/, '');  // 移除不完整的物件
  json = json.replace(/,\s*\[[^\]]*$/, '');  // 移除不完整的陣列
  json = json.replace(/,\s*$/, '');           // 移除尾部逗號

  // 計算並補齊缺少的括號
  let brackets = 0, braces = 0, inStr = false, escape = false;
  for (const ch of json) {
    if (escape) { escape = false; continue; }
    if (ch === '\\') { escape = true; continue; }
    if (ch === '"') { inStr = !inStr; continue; }
    if (inStr) continue;
    if (ch === '{') braces++;
    if (ch === '}') braces--;
    if (ch === '[') brackets++;
    if (ch === ']') brackets--;
  }
  json += ']'.repeat(Math.max(0, brackets));
  json += '}'.repeat(Math.max(0, braces));

  try { return JSON.parse(json); } catch(e) {
    throw new Error('JSON 解析失敗，行程資料可能過長。請嘗試縮短天數或選擇「充實緊湊」節奏。');
  }
}

// ── Map ──
function TripMap({ days, selectedDay }) {
  const mapRef = useRef(null);
  const mapInstance = useRef(null);
  const markersRef = useRef([]);
  useEffect(() => {
    if (!mapRef.current||mapInstance.current) return;
    mapInstance.current = L.map(mapRef.current,{zoomControl:false}).setView([35.68,139.76],12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(mapInstance.current);
    L.control.zoom({position:'topright'}).addTo(mapInstance.current);
  }, []);
  useEffect(() => {
    if (!mapInstance.current||!days?.length) return;
    markersRef.current.forEach(m => m.remove()); markersRef.current = [];
    const bounds = [];
    const dayData = selectedDay!==null ? [days[selectedDay]] : days;
    dayData.forEach(day => {
      (day.activities||[]).forEach((act, ai) => {
        if (!act.location?.lat||!act.location?.lng) return;
        const pos = [act.location.lat, act.location.lng]; bounds.push(pos);
        const color = CATEGORY_COLORS[act.category]||'#6366f1';
        const icon = L.divIcon({ className:'', html:`<div style="background:${color};color:white;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3)">${selectedDay!==null?ai+1:''}</div>`, iconSize:[28,28], iconAnchor:[14,14] });
        const m = L.marker(pos,{icon}).addTo(mapInstance.current).bindPopup(`<b>${CATEGORY_ICONS[act.category]||''} ${act.name}</b><br>${act.time}${act.endTime?' - '+act.endTime:''}<br><small>${act.description||''}</small>`);
        markersRef.current.push(m);
      });
    });
    if (bounds.length > 0) mapInstance.current.fitBounds(bounds, { padding:[40,40], maxZoom:15 });
  }, [days, selectedDay]);
  return <div ref={mapRef} style={{width:'100%',height:'100%',minHeight:300}} />;
}

// ── Budget Chart ──
function BudgetChart({ totalBudget, currency }) {
  const t = useT();
  const canvasRef = useRef(null); const chartRef = useRef(null);
  const sym = CURRENCY_SYMBOLS[currency]||'';
  useEffect(() => {
    if (!canvasRef.current||!totalBudget) return;
    if (chartRef.current) chartRef.current.destroy();
    const labels = [t.food,t.transport,t.activities,t.accommodation,t.misc];
    const values = [totalBudget.food,totalBudget.transport,totalBudget.activities,totalBudget.accommodation,totalBudget.miscellaneous||0];
    const colors = ['#f97316','#64748b','#6366f1','#06b6d4','#a3a3a3'];
    chartRef.current = new Chart(canvasRef.current, { type:'doughnut', data:{labels,datasets:[{data:values,backgroundColor:colors,borderWidth:0,hoverOffset:8}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${sym}${ctx.parsed.toLocaleString()}`}}}}
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [totalBudget,currency]);
  if (!totalBudget) return null;
  const items = [[t.food,totalBudget.food,'#f97316','🍜'],[t.transport,totalBudget.transport,'#64748b','🚆'],[t.activities,totalBudget.activities,'#6366f1','🎫'],[t.accommodation,totalBudget.accommodation,'#06b6d4','🏨'],[t.misc,totalBudget.miscellaneous||0,'#a3a3a3','📦']];
  return (
    <div>
      <div className="relative" style={{height:200}}><canvas ref={canvasRef}/><div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none"><span className="text-xs text-gray-400">{t.totalLabel}</span><span className="text-lg font-bold text-gray-800">{sym}{(totalBudget.total||0).toLocaleString()}</span></div></div>
      <div className="mt-4 space-y-2">{items.filter(i=>i[1]>0).map(([label,val,color,icon]) => (
        <div key={label} className="flex items-center justify-between text-sm"><div className="flex items-center gap-2"><span className="w-3 h-3 rounded-full" style={{background:color}}/><span className="text-gray-600">{icon} {label}</span></div><span className="font-medium text-gray-700">{sym}{val.toLocaleString()}</span></div>
      ))}</div>
    </div>
  );
}

// ── Google Calendar URL ──
function makeGCalUrl(act, date) {
  const d = date.replace(/-/g, '');
  const t1 = (act.time||'09:00').replace(':','') + '00';
  const t2 = (act.endTime||'10:00').replace(':','') + '00';
  const params = new URLSearchParams({
    action: 'TEMPLATE',
    text: act.name,
    dates: `${d}T${t1}/${d}T${t2}`,
    details: act.description || '',
    location: act.location?.address || '',
  });
  return `https://calendar.google.com/calendar/render?${params}`;
}

// ── Booking Links ──
function makeFlightUrl(origin, destination, startDate, endDate) {
  // Google Flights
  return `https://www.google.com/travel/flights?q=flights+from+${encodeURIComponent(origin)}+to+${encodeURIComponent(destination)}&d1=${startDate}&d2=${endDate}`;
}

function makeHotelUrl(destination, checkIn, checkOut) {
  // Google Hotels
  return `https://www.google.com/travel/hotels?q=hotels+in+${encodeURIComponent(destination)}&dates=${checkIn},${checkOut}`;
}

function makeMapUrl(name, city) {
  // Google Maps search
  return `https://www.google.com/maps/search/${encodeURIComponent(name + ' ' + city)}`;
}

// ── Results ──
function ResultsView({ trip, tripData, onReset, lang, apiKey, onUpdateTrip }) {
  const t = useT();
  const [selectedDay, setSelectedDay] = useState(0);
  const [activeTab, setActiveTab] = useState('itinerary');
  const [replanOpen, setReplanOpen] = useState(false);
  const [replanNote, setReplanNote] = useState('');
  const [replanning, setReplanning] = useState(false);
  const [replanMsg, setReplanMsg] = useState(null);
  const sym = CURRENCY_SYMBOLS[tripData.currency]||'';
  const days = trip.days||[];

  const handleReplanDay = async () => {
    if (replanning) return;
    setReplanning(true); setReplanMsg(null);
    try {
      const dayData = days[selectedDay];
      const prompt = buildModifyPrompt(dayData, tripData, replanNote, lang);
      const userKey = apiKey?.trim();
      let resultText;

      try {
        const proxyResult = await callTripAPI({ prompt, userApiKey: userKey || undefined, mode: 'modify' });
        resultText = proxyResult.content[0].text;
      } catch (proxyErr) {
        if (userKey && userKey.startsWith('sk-ant-')) {
          const directResult = await callClaudeDirect(userKey, prompt);
          resultText = directResult.content[0].text;
        } else {
          throw new Error(proxyErr.message || proxyErr.error || 'Service unavailable');
        }
      }

      const newDay = repairJSON(resultText);

      // 更新行程
      const newDays = [...days];
      newDays[selectedDay] = newDay;
      const newTrip = { ...trip, days: newDays };
      onUpdateTrip(newTrip);
      setReplanOpen(false); setReplanNote('');
      setReplanMsg('success');
      setTimeout(() => setReplanMsg(null), 2000);
    } catch (e) {
      setReplanMsg(e.message);
    } finally {
      setReplanning(false);
    }
  };

  const exportICS = () => {
    let ics = 'BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//TripCraft//TWTools//\n';
    days.forEach(day => { (day.activities||[]).forEach(act => {
      const dt = day.date.replace(/-/g,'');
      const t1 = (act.time||'09:00').replace(':','')+'00';
      const t2 = (act.endTime||'10:00').replace(':','')+'00';
      ics += `BEGIN:VEVENT\nDTSTART:${dt}T${t1}\nDTEND:${dt}T${t2}\nSUMMARY:${act.name}\nDESCRIPTION:${act.description||''}\nLOCATION:${act.location?.address||''}\nEND:VEVENT\n`;
    }); });
    ics += 'END:VCALENDAR';
    const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([ics],{type:'text/calendar'})); a.download = `${trip.tripTitle||'trip'}.ics`; a.click();
  };
  const exportJSON = () => {
    const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(trip,null,2)],{type:'application/json'})); a.download = `${trip.tripTitle||'trip'}.json`; a.click();
  };

  const exportPDF = () => {
    const content = document.createElement('div');

    let html = `<h1 style="color:#0d9488;margin-bottom:4px">${trip.tripTitle || 'My Trip'}</h1>`;
    html += `<p style="color:#666;font-size:14px">${tripData.startDate} ~ ${tripData.endDate} | ${sym}${Number(tripData.budget).toLocaleString()} ${tripData.currency} | ${tripData.travelers}${t.person}</p>`;
    html += `<p style="color:#888;font-size:13px">${trip.summary || ''}</p><hr style="border:none;border-top:1px solid #eee;margin:16px 0">`;

    days.forEach((day, i) => {

// Main App
// ═══════════════════════════════════════════
function App() {
  const [lang, setLang] = useState(() => {
    const saved = localStorage.getItem('tc_lang');
    if (saved && T[saved]) return saved;
    const bl = navigator.language || '';
    if (bl.startsWith('zh-CN') || bl === 'zh') return 'zh-CN';
    if (bl.startsWith('zh')) return 'zh-TW';
    if (bl.startsWith('en')) return 'en';
    return 'zh-TW';
  });
  const [step, setStep] = useState(0);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [trip, setTrip] = useState(null);
  const [apiKey, setApiKey] = useState('');
  const [quota, setQuota] = useState(null);
  const [formData, setFormData] = useState({
    destination:'', startDate:'', endDate:'', budget:'',
    currency:'TWD', travelers:2, style:'moderate', pace:'moderate',
    interests:[], notes:'', _currencyManual: false
  });

  const t = T[lang];
  useEffect(() => { localStorage.setItem('tc_lang', lang); document.documentElement.lang = lang; }, [lang]);

  const updateForm = useCallback(patch => {
    setFormData(prev => {
      const next = {...prev,...patch};
      if ('destination' in patch && !('currency' in patch) && !prev._currencyManual) {
        const detected = detectCurrencyFromDestination(patch.destination);
        if (detected) next.currency = detected;
      }
      if ('destination' in patch && 'currency' in patch && !patch._currencyManual) {
        next._currencyManual = false;
      }
      return next;
    });
  }, []);
  const numDays = useMemo(() => {
    if (!formData.startDate||!formData.endDate) return 0;
    return Math.max(1, Math.ceil((new Date(formData.endDate)-new Date(formData.startDate))/86400000)+1);
  }, [formData.startDate, formData.endDate]);

  const handleGenerate = async () => {
    setLoading(true); setError(null);
    try {
      const interestLabels = (formData.interests||[]).map(id => t['interest_'+id] || id);
      const prompt = buildPrompt({...formData, numDays, interests: interestLabels}, lang);
      let resultText;
      const userKey = apiKey.trim();

      try {
        // 嘗試走 proxy
        const proxyResult = await callTripAPI({ prompt, userApiKey: userKey || undefined });
        resultText = proxyResult.content[0].text;
        if (proxyResult.quota) setQuota(proxyResult.quota);
      } catch (proxyErr) {
        if (proxyErr.error === 'free_limit_reached') {
          setQuota({ used: proxyErr.used, limit: proxyErr.limit, remaining: 0 });
          throw new Error(proxyErr.message);
        }
        // Proxy 不可用，fallback 直呼 Anthropic（需要 user key）
        if (userKey && userKey.startsWith('sk-ant-')) {
          const directResult = await callClaudeDirect(userKey, prompt);
          resultText = directResult.content[0].text;
        } else {
          throw new Error(proxyErr.message || proxyErr.error || 'Service unavailable');
        }
      }

      setTrip(repairJSON(resultText));
    } catch (e) {
      setError(e.message);
      setLoading(false);
    }
  };

  const handleReset = () => { setTrip(null); setStep(0); setLoading(false); setError(null); };

  if (trip) return (
    <I18nContext.Provider value={t}>
      <ResultsView trip={trip} tripData={formData} onReset={handleReset} lang={lang} apiKey={apiKey} onUpdateTrip={setTrip} />
    </I18nContext.Provider>
  );

  return (
    <I18nContext.Provider value={t}>
      <div className="min-h-screen bg-gradient-to-br from-brand-50 via-white to-accent-50">
        <div className="max-w-xl mx-auto px-4 py-8">
          <div className="flex justify-between items-start mb-6">
            <BackToTWTools />
            <LangSwitcher lang={lang} setLang={setLang} />
          </div>
          <div className="text-center mb-8">
            <div className="flex justify-center mb-3"><Logo /></div>
            <h1 className="text-3xl font-bold text-gray-800">{t.appTitle}</h1>
            <p className="text-gray-500 mt-1">{t.appSubtitle}</p>
          </div>
          {loading ? <LoadingScreen /> : (
            <>
              <StepIndicator current={step} total={4} />
              {error && (
                <div className="mb-4 p-4 bg-red-50 border border-red-200 rounded-xl text-red-700 text-sm">
                  <p className="font-semibold mb-1">{t.errorTitle}</p><p>{error}</p>
                  <button onClick={() => {setError(null);setLoading(false);}} className="mt-2 text-red-600 underline text-xs">{t.close}</button>
                </div>
              )}
              {step===0 && <StepDestination data={formData} onChange={updateForm} onNext={() => setStep(1)} lang={lang} />}
              {step===1 && <StepDatesAndBudget data={formData} onChange={updateForm} onNext={() => setStep(2)} onBack={() => setStep(0)} />}
              {step===2 && <StepPreferences data={formData} onChange={updateForm} onNext={() => setStep(3)} onBack={() => setStep(1)} />}
              {step===3 && <StepReview data={formData} onBack={() => setStep(2)} onGenerate={handleGenerate} apiKey={apiKey} setApiKey={setApiKey} quota={quota} />}
            </>
          )}
          <div className="flex justify-center gap-4 text-xs text-gray-400 mt-8 mb-2">
            <a href="/trip/about.html" className="hover:text-brand-500 no-underline">{t.footerAbout}</a>
            <span>·</span>
            <a href="/trip/privacy.html" className="hover:text-brand-500 no-underline">{t.footerPrivacy}</a>
            <span>·</span>
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSd_XdTrj_rdYmYrjW4MbD3EG4LM3hMLbw6Dg5p_wEEoQwisrA/viewform" target="_blank" rel="noopener" className="hover:text-brand-500 no-underline">{t.footerFeedback}</a>
          </div>
          <p className="text-center text-xs text-gray-400 mt-2">{t.poweredBy}</p>
        </div>
      </div>
    </I18nContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
